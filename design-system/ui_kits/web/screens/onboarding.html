<!DOCTYPE html>
<!-- @dsCard group="UI Kit — Web" name="Onboarding" subtitle="Post-signup profile setup — step 1 of 3" viewport="1400x1100" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plano — Onboarding</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../../../colors_and_type.css">
<link rel="stylesheet" href="../_shared/kit.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../../_ds_bundle.js"></script>
<script type="text/babel" src="../_shared/kit-lib.jsx"></script>
<style>
  /* ---- inputs (screen-specific) ---- */
  .inp{width:100%;height:46px;border:1px solid var(--border-strong);background:#fff;border-radius:2px;padding:0 14px;font-size:15px;color:var(--text-primary);outline:none;transition:border 150ms}
  .inp:focus{border-color:#171717}
  .inp::placeholder{color:var(--text-disabled)}
  .inp-icon{position:relative}
  .inp-icon .ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-secondary);pointer-events:none}
  .inp-icon .inp{padding-left:40px}
  .fld label{font-size:13px;font-weight:500;color:var(--text-primary);display:block;margin-bottom:8px}
  .fld .hint{font-size:11px;color:var(--text-secondary);margin-top:7px}

  /* ============ ONBOARDING ============ */
  .ob-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:56px 16px 80px}
  .ob-card{width:100%;max-width:400px;background:var(--surface-card);border:1px solid var(--border-default);border-radius:2px;padding:32px}
  .ob-steps{display:flex;align-items:center;gap:6px;justify-content:center;margin-bottom:24px}
  .ob-step{height:3px;width:34px;border-radius:2px;background:var(--border-default)}
  .ob-step.on{background:var(--text-primary)}
  .ob-invite{display:flex;gap:12px;align-items:flex-start;text-align:left;border:1px solid var(--border-default);background:var(--surface-muted);border-radius:2px;padding:14px}
  .ob-check{width:18px;height:18px;border-radius:2px;border:1.5px solid var(--text-primary);background:var(--text-primary);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
  .ob-invite-av{width:38px;height:38px;border-radius:9999px;background-size:cover;background-position:center;filter:grayscale(1);border:1px solid var(--border-default);flex-shrink:0}
  .ob-avatar-drop{width:104px;height:104px;border-radius:9999px;background-size:cover;background-position:center;background-color:var(--surface-muted);filter:grayscale(1);border:1px solid var(--border-default);margin:0 auto}
  .ob-upload{display:inline-flex;align-items:center;gap:8px;border:1.5px dashed var(--border-strong);border-radius:2px;padding:9px 16px;font-size:13px;color:var(--text-secondary);cursor:pointer;background:none;transition:border-color 150ms,color 150ms}
  .ob-upload:hover{border-color:var(--text-primary);color:var(--text-primary)}
  .cta-quiet{color:var(--text-secondary)}
  .cta-quiet:hover{color:var(--text-primary)}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;
const { PlanoLogo } = window.PlanoDesignSystem_e8d587;

const IMG = {
  p1:"https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=200&q=80",
  me:"https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=300&q=80",
};

const Onboarding = () => {
  const [follow, setFollow] = useState(true);
  return (
    <div className="ob-wrap">
      <PlanoLogo size={22} color="#171717" style={{marginBottom:36}}/>
      <div className="ob-card">
        <div className="ob-steps">
          <span className="ob-step on"/><span className="ob-step"/><span className="ob-step"/>
        </div>
        <div style={{textAlign:"center"}}>
          <div className="eyebrow" style={{marginBottom:14}}>Step 1 of 3 · Profile</div>
          <h1 style={{fontSize:32,fontWeight:700,letterSpacing:"-.03em",margin:0}}>Welcome.</h1>
          <p style={{fontSize:15,color:"var(--text-secondary)",margin:"10px 0 0"}}>Let's set up your profile.</p>
        </div>

        <div className="ob-invite" style={{margin:"24px 0"}}>
          <div className="ob-invite-av" style={{backgroundImage:`url(${IMG.p1})`}}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:9}}>
              <button className="ob-check" style={{background:follow?"var(--text-primary)":"none",color:follow?"#fff":"transparent"}} onClick={()=>setFollow(!follow)}>
                {follow && <Icon name="check" size={13}/>}
              </button>
              <span style={{fontSize:14,fontWeight:500}}>Follow harriet.w</span>
            </div>
            <p style={{fontSize:12,color:"var(--text-secondary)",margin:"5px 0 0",paddingLeft:27}}>They invited you.</p>
          </div>
        </div>

        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14,margin:"8px 0 28px"}}>
          <div className="ob-avatar-drop" style={{backgroundImage:`url(${IMG.me})`}}/>
          <button className="ob-upload"><Icon name="upload" size={15}/> Change photo</button>
        </div>

        <div style={{textAlign:"left"}}>
          <div className="fld" style={{marginBottom:20}}>
            <label>Username</label>
            <div className="inp-icon"><span className="ic"><Icon name="user" size={16}/></span>
              <input className="inp" defaultValue="jaimenoain"/></div>
            <p className="hint">This is how other architecture lovers will see you.</p>
          </div>
          <div className="fld">
            <label>Where do you live?</label>
            <div className="inp-icon"><span className="ic"><Icon name="mappin" size={16}/></span>
              <input className="inp" defaultValue="Madrid, Spain"/></div>
            <p className="hint">Helps us show local architecture info.</p>
          </div>
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:12,marginTop:28}}>
          <button className="btn btn-primary" style={{width:"100%"}}>Save and continue</button>
          <button className="cta cta-quiet" style={{justifyContent:"center",padding:"6px 0"}}>Skip for now</button>
        </div>
      </div>
    </div>
  );
};

function App(){
  return (
    <div data-screen-label="Onboarding">
      <Onboarding/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
