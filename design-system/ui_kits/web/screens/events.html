<!DOCTYPE html>
<!-- @dsCard group="UI Kit — Web" name="Events" subtitle="Community calendar — featured + grid" viewport="1400x2400" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plano — Events</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../../../colors_and_type.css">
<link rel="stylesheet" href="../_shared/kit.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../../_ds_bundle.js"></script>
<script type="text/babel" src="../_shared/kit-lib.jsx"></script>
<style>
  .screen{max-width:1360px;margin:0 auto}
  /* Photo placeholders — on-brand hatch + mono caption (awaiting art) */
  .ph{position:relative;background-color:var(--surface-muted);background-image:repeating-linear-gradient(135deg,transparent 0 11px,rgba(0,0,0,.035) 11px 12px);display:flex;align-items:flex-end;overflow:hidden}
  .ph::after{content:attr(data-label);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-disabled);padding:12px 14px;line-height:1.3}

  /* ============ EVENTS ============ */
  .ev-head{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap;border-bottom:1px solid var(--border-default);padding-bottom:32px;margin-bottom:44px}
  .ev-title{font-size:44px;font-weight:700;letter-spacing:-.03em;line-height:1;margin:10px 0 0}
  .ev-hero{display:grid;grid-template-columns:1.35fr 1fr;gap:0;border:1px solid var(--border-default);margin-bottom:64px;background:#fff}
  .ev-hero-img{aspect-ratio:4/3;background-size:cover;background-position:center}
  .ev-hero-body{padding:44px 40px;display:flex;flex-direction:column;justify-content:space-between}
  .ev-hero-type{font-size:10px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--text-secondary)}
  .ev-hero-name{font-size:38px;font-weight:700;letter-spacing:-.03em;line-height:1.02;margin:20px 0 0}
  .ev-datebar{display:flex;align-items:center;gap:20px;margin-top:26px}
  .ev-datecard{border:1px solid var(--border-default);width:64px;flex-shrink:0;text-align:center}
  .ev-datecard .m{font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#fff;background:#171717;padding:5px 0}
  .ev-datecard .d{font-size:26px;font-weight:700;letter-spacing:-.02em;padding:8px 0 10px}
  .ev-when{font-size:14px;color:var(--text-secondary);line-height:1.5}
  .ev-when .place{color:var(--text-primary);font-weight:500}
  .ev-hero-foot{margin-top:32px;display:flex;align-items:center;justify-content:space-between}

  .ev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px 24px}
  .ev-card{cursor:pointer}
  .ev-card-img{aspect-ratio:4/3;background-size:cover;background-position:center}
  .ev-card-type{font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--text-secondary);margin-top:16px;display:flex;align-items:center;gap:8px}
  .ev-card-name{font-size:22px;font-weight:700;letter-spacing:-.02em;line-height:1.1;margin:8px 0 0;color:var(--text-primary)}
  .ev-card:hover .ev-card-name{color:var(--text-secondary)}
  .ev-card-meta{font-size:13px;color:var(--text-secondary);margin-top:10px;display:flex;flex-direction:column;gap:3px}
  .ev-card-meta .mono{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.03em}

  @media (max-width:900px){
    .ev-hero{grid-template-columns:1fr}
    .ev-grid{grid-template-columns:1fr 1fr}
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { AppTopNav, SiteFooter } = window.PlanoDesignSystem_e8d587;

const EVENTS = [
  {type:"Exhibition", name:"Concrete Utopia: Brutalism Reconsidered", city:"London · Barbican", date:"14 Jul – 28 Sep", mono:"MoMA touring"},
  {type:"Guided tour", name:"Hampstead Modernism Walk", city:"London, UK", date:"Sat 19 Jul · 10:00", mono:"90 min · £18"},
  {type:"Lecture", name:"In conversation: Kazuyo Sejima", city:"Online", date:"Thu 24 Jul · 18:30", mono:"Free · RSVP"},
  {type:"Open house", name:"Salk Institute Open Day", city:"La Jolla, USA", date:"Sun 3 Aug · 09:00", mono:"Members only"},
  {type:"Festival", name:"Open House Chicago", city:"Chicago, USA", date:"18 – 19 Oct", mono:"170 sites"},
  {type:"Guided tour", name:"Therme Vals Architecture Weekend", city:"Vals, Switzerland", date:"6 – 7 Sep", mono:"12 places"},
];

const Events = () => (
  <div className="screen">
    <div style={{maxWidth:1120,margin:"0 auto",padding:"40px 32px 96px"}}>
      <header className="ev-head">
        <div>
          <div className="eyebrow">Community calendar</div>
          <h1 className="ev-title">Upcoming events</h1>
        </div>
        <button className="cta">Share an event <span className="ar">→</span></button>
      </header>

      {/* Featured hero */}
      <article className="ev-hero">
        <div className="ev-hero-img ph" data-label="Barbican Art Gallery"/>
        <div className="ev-hero-body">
          <div>
            <div className="ev-hero-type">Featured · Exhibition</div>
            <h2 className="ev-hero-name">Concrete Utopia: Brutalism Reconsidered</h2>
            <div className="ev-datebar">
              <div className="ev-datecard"><div className="m">Jul</div><div className="d">14</div></div>
              <div className="ev-when">
                <div>14 July – 28 September 2026</div>
                <div className="place">Barbican Art Gallery, London</div>
              </div>
            </div>
          </div>
          <div className="ev-hero-foot">
            <span className="eyebrow" style={{fontFamily:"'Space Mono',monospace",letterSpacing:".03em"}}>MoMA touring show</span>
            <button className="cta">Details <span className="ar">→</span></button>
          </div>
        </div>
      </article>

      {/* Grid */}
      <div className="ev-grid">
        {EVENTS.slice(1).map((e,i)=>(
          <article key={i} className="ev-card">
            <div className="ev-card-img ph" data-label={e.city}/>
            <div className="ev-card-type"><span>{e.type}</span></div>
            <h3 className="ev-card-name">{e.name}</h3>
            <div className="ev-card-meta">
              <span className="mono">{e.date}</span>
              <span>{e.city} · {e.mono}</span>
            </div>
          </article>
        ))}
      </div>
    </div>
  </div>
);

function App(){
  return (
    <div data-screen-label="Events">
      <AppTopNav activePath="/events" userInitial="J"/>
      <Events/>
      <SiteFooter/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
