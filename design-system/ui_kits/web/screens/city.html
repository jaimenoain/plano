<meta charset="UTF-8">
<title>Plano — City page</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="stylesheet" href="../_shared/kit.css">

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<style>
  /* Rating dots */
  .rdots{display:inline-flex;gap:4px;vertical-align:middle;align-items:center}
  .rdot{width:10px;height:10px;border-radius:9999px;background:#171717;display:inline-block}
  .rdot.sm{width:8px;height:8px}

  /* ============ MAP primitives ============ */
  .map-canvas{position:absolute;inset:0;background:
    linear-gradient(rgba(0,0,0,0.045) 1px,transparent 1px) 0 0/54px 54px,
    linear-gradient(90deg,rgba(0,0,0,0.045) 1px,transparent 1px) 0 0/54px 54px,
    #E9E9E7}
  .map-road{position:absolute;background:#fff}
  .pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;color:#171717;display:flex;flex-direction:column;align-items:center;z-index:3}
  .pin .num{width:26px;height:26px;border-radius:9999px 9999px 9999px 2px;transform:rotate(45deg);background:#171717;border:2px solid #fff;box-shadow:var(--shadow-md);display:flex;align-items:center;justify-content:center}
  .pin .num span{transform:rotate(-45deg);color:#fff;font-size:12px;font-weight:600}
  .pin.active .num{background:#171717;width:32px;height:32px}
  .pin.active .plabel{display:block}
  .plabel{display:none;margin-top:8px;background:#171717;color:#fff;font-size:11px;font-weight:600;letter-spacing:-.01em;padding:4px 8px;border-radius:2px;white-space:nowrap}
  .map-ctrls{position:absolute;top:16px;right:16px;display:flex;flex-direction:column;background:#fff;border:1px solid var(--border-default);border-radius:2px;overflow:hidden;z-index:5}
  .map-ctrls button{width:38px;height:38px;border:0;background:#fff;font-size:18px;color:var(--text-primary);cursor:pointer;border-bottom:1px solid var(--border-default)}
  .map-ctrls button:last-child{border-bottom:0}
  .map-ctrls button:hover{background:var(--surface-muted)}
  .map-cap{position:absolute;left:16px;bottom:14px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-disabled);background:rgba(255,255,255,.82);padding:5px 8px;z-index:5}

  /* ============ CITY / LOCALITY ============ */
  .city{max-width:960px;margin:0 auto}
  .city-hero{position:relative;height:clamp(340px,52vh,520px);overflow:hidden;background:#000}
  .city-hero-img{position:absolute;inset:0;background-size:cover;background-position:center;filter:grayscale(.15) contrast(1.02)}
  .city-hero-scrim{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.82) 0%,rgba(0,0,0,.2) 48%,rgba(0,0,0,.28) 100%)}
  .city-hero-inner{position:absolute;left:0;right:0;bottom:0;max-width:960px;margin:0 auto;padding:0 32px 44px;width:100%}
  .city-eyebrow{font-size:10px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.72)}
  .city-region{font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-top:10px}
  .city-name{font-size:clamp(56px,8vw,104px);font-weight:700;letter-spacing:-.045em;line-height:.9;color:#fff;margin:12px 0 0}
  .city-credit{position:absolute;right:32px;bottom:16px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.05em;color:rgba(255,255,255,.55);display:flex;align-items:center;gap:6px;z-index:2}

  .city-body{padding:0 32px 120px}
  .city-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;border-bottom:1px solid var(--border-default);padding:40px 0}
  .city-stat .v{font-size:38px;font-weight:700;letter-spacing:-.02em;line-height:1;font-variant-numeric:tabular-nums}
  .city-stat .l{display:flex;align-items:center;gap:7px;font-size:10px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--text-secondary);margin-top:12px}

  .city-actions{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--border-default)}
  .city-action{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:22px 24px;border-left:1px solid var(--border-default);cursor:pointer;transition:background 150ms}
  .city-action:first-child{border-left:0}
  .city-action:hover{background:var(--surface-muted)}
  .city-action .l{display:flex;align-items:center;gap:11px;font-size:12px;font-weight:500;letter-spacing:.13em;text-transform:uppercase}
  .city-action .ar{color:var(--text-primary);transition:transform 150ms}
  .city-action:hover .ar{transform:translateX(3px)}
  .city-action.hl:hover .ar{color:#BEFF00}

  .city-sec{margin-top:56px;border-top:1px solid var(--border-default);padding-top:36px}
  .city-sec:first-child{border-top:0}
  .sec-h{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:22px}
  .sec-label{font-size:10px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--text-secondary)}
  .sec-more{font-size:10px;font-weight:500;letter-spacing:.13em;text-transform:uppercase;color:var(--text-disabled)}
  .sec-more:hover{color:var(--text-primary);cursor:pointer}

  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
  .chip{min-height:36px;padding:0 14px;display:inline-flex;align-items:center;border:1px solid var(--border-default);border-radius:2px;font-size:10px;font-weight:500;letter-spacing:.11em;text-transform:uppercase;color:var(--text-secondary);background:#fff;cursor:pointer;transition:all 150ms}
  .chip:hover{border-color:#171717;color:var(--text-primary)}
  .chip.on{background:#171717;border-color:#171717;color:#fff}
  .chips-sep{width:1px;align-self:stretch;background:var(--border-default);margin:2px 4px}

  .city-map{height:420px;position:relative;border:1px solid var(--border-default);overflow:hidden}

  /* Top buildings */
  .tb-hero{position:relative;display:block;border:1px solid var(--border-default);overflow:hidden;aspect-ratio:16/9;margin-bottom:12px;cursor:pointer}
  .tb-hero-img{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform 500ms}
  .tb-hero:hover .tb-hero-img{transform:scale(1.02)}
  .tb-hero-scrim{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.72),rgba(0,0,0,.05) 55%,transparent)}
  .tb-hero-meta{position:absolute;left:0;right:0;bottom:0;padding:24px}
  .tb-hero-yr{font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:6px}
  .tb-hero-name{font-size:28px;font-weight:700;letter-spacing:-.025em;line-height:1;color:#fff}
  .tb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .tb-card{cursor:pointer}
  .tb-card-img{aspect-ratio:4/3;background-size:cover;background-position:center;background-color:var(--surface-muted)}
  .tb-card-yr{font-size:9px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--text-disabled);margin-top:10px}
  .tb-card-name{font-size:15px;font-weight:600;letter-spacing:-.01em;line-height:1.15;margin-top:4px}
  .tb-card:hover .tb-card-name{color:var(--text-secondary)}

  /* Stewards */
  .stw{border-top:1px solid var(--border-default);border-bottom:1px solid var(--border-default)}
  .stw-row{display:flex;align-items:center;gap:16px;padding:14px 4px;border-bottom:1px solid var(--border-default);cursor:pointer;transition:background 150ms}
  .stw-row:last-child{border-bottom:0}
  .stw-row:hover{background:var(--surface-muted)}
  .stw-rank{width:26px;font-family:'Space Mono',monospace;font-size:11px;color:var(--text-disabled);flex-shrink:0}
  .stw-av{width:42px;height:42px;border-radius:9999px;border:1px solid var(--border-default);background-size:cover;background-position:center;filter:grayscale(1);flex-shrink:0}
  .stw-main{flex:1;min-width:0}
  .stw-name{font-size:14px;font-weight:500;display:flex;align-items:center;gap:9px}
  .stw-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:500;letter-spacing:.13em;text-transform:uppercase;color:var(--text-secondary)}
  .stw-stats{font-size:11px;color:var(--text-secondary);margin-top:4px;display:flex;flex-wrap:wrap;gap:14px}
  .stw-stats span{display:inline-flex;align-items:center;gap:5px;font-variant-numeric:tabular-nums}

  /* City guides */
  .cg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px 20px}
  .cg-card{cursor:pointer}
  .cg-mosaic{display:grid;grid-template-columns:2fr 1fr;gap:1.5px;background:var(--border-default);aspect-ratio:4/3}
  .cg-mosaic .m2{display:grid;grid-template-rows:1fr 1fr;gap:1.5px}
  .cg-mosaic i{display:block;background-size:cover;background-position:center;background-color:var(--surface-muted)}
  .cg-name{font-size:14px;font-weight:600;letter-spacing:-.01em;line-height:1.2;margin-top:12px}
  .cg-card:hover .cg-name{color:var(--text-secondary)}
  .cg-meta{font-size:11px;color:var(--text-disabled);margin-top:5px}

  /* Events */
  .ev-row{display:flex;align-items:flex-start;gap:18px;padding:16px 0;border-bottom:1px solid var(--border-default);cursor:pointer}
  .ev-row:first-child{border-top:1px solid var(--border-default)}
  .ev-date{width:44px;text-align:center;flex-shrink:0}
  .ev-date .mo{font-size:9px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--text-disabled)}
  .ev-date .dy{font-size:22px;font-weight:700;letter-spacing:-.02em;line-height:1;margin-top:3px}
  .ev-main{flex:1;min-width:0}
  .ev-name{font-size:15px;font-weight:500}
  .ev-row:hover .ev-name{color:var(--text-secondary)}
  .ev-meta{margin-top:7px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .ev-loc{font-size:11px;color:var(--text-disabled)}
  .ev-tag{border:1px solid var(--border-default);padding:2px 7px;font-size:9px;font-weight:500;letter-spacing:.11em;text-transform:uppercase;color:var(--text-disabled)}
</style>
</head>

<script type="text/babel">
const { useState } = React;
const { AppTopNav, SiteFooter } = window.PlanoDesignSystem_e8d587;

const P = {
  plus:'<path d="M12 5v14"/><path d="M5 12h14"/>',
  building:'<rect width="16" height="20" x="4" y="2" rx="1"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M8 10h.01"/><path d="M16 10h.01"/><path d="M8 14h.01"/><path d="M16 14h.01"/>',

  camera:'<path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/>',
  book:'<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>',
  map:'<path d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0z"/><path d="M9 4v13"/><path d="M15 7v13"/>',
  star:'<path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.12 2.12 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.12 2.12 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.12 2.12 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.12 2.12 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.12 2.12 0 0 0 1.597-1.16z" fill="currentColor" stroke="none"/>',
  cal:'<path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/>',
  arrowright:'<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>',

const Icon = ({name, size=18, style}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none"

const IMG = {
  barbican:"https://images.unsplash.com/photo-1460574283810-2aab119d8511?w=1000&q=80",
  natl:"https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=1000&q=80",
  hayward:"https://images.unsplash.com/photo-1517263904808-5dc91e3e7044?w=1000&q=80",
  trellick:"https://images.unsplash.com/photo-1493397212122-2b85dda8106b?w=1000&q=80",

  portrait2:"https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=400&q=80",
  portrait3:"https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=400&q=80",
  portrait4:"https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=400&q=80",
};

const STAT = [
  {ic:"building", v:"1,284", l:"Buildings"},
  {ic:"book", v:"46", l:"Collections"},
  {ic:"users", v:"3,910", l:"Contributors"},
  {ic:"camera", v:"12.6k", l:"Photos"},
];
const CITY_TOP = [
  {img:IMG.gherkin, yr:"2003", name:"30 St Mary Axe"},
  {img:IMG.tate, yr:"2000", name:"Tate Modern"},

  {main:IMG.tate, a:IMG.hayward, b:IMG.economist, name:"South Bank in a day", meta:"9 buildings · marcusbuilt"},
];

  const pins = [[24,38],[40,30],[52,54],[66,42],[34,64],[72,66],[46,72],[60,24]];

    <div className="city-map">

const City = () => {
  const [style, setStyle] = useState("Brutalist");
  const [access, setAccess] = useState(null);
  const STYLES = ["Brutalist","Modernist","Art Deco","Gothic","High-Tech"];

            {ACCESS.map(a=><button key={a} className={`chip ${access===a?'on':''}`} onClick={()=>setAccess(access===a?null:a)}>{a}</button>)}

          </div>
          <CityMap/>
        </section>

        {/* Top buildings */}
        <section className="city-sec">
          <div className="sec-h"><span className="sec-label">Top buildings</span><span className="sec-more">All 1,284 →</span></div>
          <div className="tb-hero">
            <div className="tb-hero-img" style={{backgroundImage:`url(${IMG.barbican})`}}/>
            <div className="tb-hero-scrim"/>
            <div className="tb-hero-meta">
              <div className="tb-hero-yr">1976 · Chamberlin, Powell &amp; Bon</div>
              <div className="tb-hero-name">Barbican Estate</div>
            </div>
          </div>
          <div className="tb-grid">
            {CITY_TOP.map((b,i)=>(
              <div key={i} className="tb-card">
                <div className="tb-card-img" style={{backgroundImage:`url(${b.img})`}}/>
                <div className="tb-card-yr">{b.yr}</div>
                <div className="tb-card-name">{b.name}</div>
              </div>
            ))}
          </div>
        </section>

        {/* Stewards */}
        <section className="city-sec">
          <div className="sec-h"><span className="sec-label">Local experts &amp; stewards</span><span className="sec-more" style={{fontFamily:"'Space Mono',monospace"}}>3,910</span></div>
          <div className="stw">
            {STEWARDS.map((s,i)=>(
              <div key={i} className="stw-row">
                <div className="stw-rank">{String(i+1).padStart(2,"0")}</div>
                <div className="stw-av" style={{backgroundImage:`url(${s.av})`}}/>
                <div className="stw-main">
                  <div className="stw-name">{s.name}{s.amb && <span className="stw-badge"><Icon name="star" size={11}/> {s.title}</span>}</div>
                  <div className="stw-stats">
                    <span><Icon name="building" size={12} style={{color:"var(--text-disabled)"}}/>{s.b}</span>
                    <span><Icon name="camera" size={12} style={{color:"var(--text-disabled)"}}/>{s.p}</span>
                    <span><Icon name="book" size={12} style={{color:"var(--text-disabled)"}}/>{s.r}</span>
                  </div>
                </div>
                <span style={{color:"var(--text-disabled)"}}><Icon name="arrowright" size={15}/></span>
              </div>
            ))}
          </div>
        </section>

        {/* City guides */}
        <section className="city-sec">
          <div className="sec-h"><span className="sec-label">City guides</span><span className="sec-more">Browse collections →</span></div>
          <div className="cg-grid">
            {GUIDES.map((g,i)=>(
              <div key={i} className="cg-card">
                <div className="cg-mosaic">
                  <i style={{backgroundImage:`url(${g.main})`}}/>
                  <div className="m2"><i style={{backgroundImage:`url(${g.a})`}}/><i style={{backgroundImage:`url(${g.b})`}}/></div>
                </div>
                <div className="cg-name">{g.name}</div>
                <div className="cg-meta">{g.meta}</div>
              </div>
            ))}
          </div>
        </section>

        {/* Events */}
        <section className="city-sec">
          <div className="sec-h"><span className="sec-label">Events</span><span className="sec-more">All events →</span></div>
          <div>
            {CITY_EVENTS.map((e,i)=>(
              <div key={i} className="ev-row">
                <div className="ev-date"><div className="mo">{e.mo}</div><div className="dy">{e.dy}</div></div>
                <div className="ev-main">
                  <div className="ev-name">{e.name}</div>
                  <div className="ev-meta">
                    <span className="ev-loc">{e.loc}</span>
                    {e.tags.map(t=><span key={t} className="ev-tag">{t}</span>)}
                  </div>
                </div>
                <span style={{color:"var(--text-disabled)",marginTop:2}}><Icon name="cal" size={15}/></span>
              </div>
            ))}
          </div>
        </section>
      </div>
    </div>
  );
};

function App(){
  return (
    <div data-screen-label="City page">
      <AppTopNav activePath="/guides" userInitial="J"/>
      <City/>
      <SiteFooter/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
