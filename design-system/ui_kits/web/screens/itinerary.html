<!DOCTYPE html>
<!-- @dsCard group="UI Kit — Web" name="Itinerary map" subtitle="Collection map + multi-day walking itinerary" viewport="1400x1000" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plano — Itinerary map</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../../../colors_and_type.css">
<link rel="stylesheet" href="../_shared/kit.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../../_ds_bundle.js"></script>
<script type="text/babel" src="../_shared/kit-lib.jsx"></script>
<style>
  .icon-btn{width:36px;height:36px;border-radius:2px;border:1px solid var(--border-default);background:#fff;color:var(--text-secondary);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all 150ms}
  .icon-btn:hover{background:var(--surface-muted);color:var(--text-primary)}
  /* Rating dots */
  .rdots{display:inline-flex;gap:4px;vertical-align:middle;align-items:center}
  .rdot{width:10px;height:10px;border-radius:9999px;background:#171717;display:inline-block}
  .rdot.sm{width:8px;height:8px}

  /* ============ MAP primitives ============ */
  .map-col{position:relative;background:#EDEDED;overflow:hidden}
  .map-canvas{position:absolute;inset:0;background:
    linear-gradient(rgba(0,0,0,0.045) 1px,transparent 1px) 0 0/54px 54px,
    linear-gradient(90deg,rgba(0,0,0,0.045) 1px,transparent 1px) 0 0/54px 54px,
    #E9E9E7}
  .map-road{position:absolute;background:#fff}
  .map-route{position:absolute;inset:0;pointer-events:none;z-index:2}
  .pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;color:#171717;display:flex;flex-direction:column;align-items:center;z-index:3}
  .pin .num{width:26px;height:26px;border-radius:9999px 9999px 9999px 2px;transform:rotate(45deg);background:#171717;border:2px solid #fff;box-shadow:var(--shadow-md);display:flex;align-items:center;justify-content:center}
  .pin .num span{transform:rotate(-45deg);color:#fff;font-size:12px;font-weight:600}
  .pin.active .num{background:#171717;width:32px;height:32px}
  .pin.active .num span{font-size:14px}
  .pin.active .plabel{display:block}
  .plabel{display:none;margin-top:8px;background:#171717;color:#fff;font-size:11px;font-weight:600;letter-spacing:-.01em;padding:4px 8px;border-radius:2px;white-space:nowrap}
  .map-ctrls{position:absolute;top:16px;right:16px;display:flex;flex-direction:column;background:#fff;border:1px solid var(--border-default);border-radius:2px;overflow:hidden;z-index:5}
  .map-ctrls button{width:38px;height:38px;border:0;background:#fff;font-size:18px;color:var(--text-primary);cursor:pointer;border-bottom:1px solid var(--border-default)}
  .map-ctrls button:last-child{border-bottom:0}
  .map-ctrls button:hover{background:var(--surface-muted)}
  .map-cap{position:absolute;left:16px;bottom:14px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-disabled);background:rgba(255,255,255,.82);padding:5px 8px;z-index:5}

  /* ============ COLLECTION / ITINERARY ============ */
  .col-shell{display:grid;grid-template-columns:1fr 396px;height:calc(100vh - 64px)}
  .col-side{border-left:1px solid var(--border-default);background:var(--surface-card);display:flex;flex-direction:column;overflow:hidden}
  .col-mosaic{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5px;background:var(--border-default);flex-shrink:0}
  .col-mosaic .cell{aspect-ratio:4/5;background-size:cover;background-position:center;background-color:var(--surface-muted)}
  .col-head{padding:20px 22px 18px;border-bottom:1px solid var(--border-default);flex-shrink:0}
  .col-title{font-size:23px;font-weight:700;letter-spacing:-.02em;line-height:1.05;margin:8px 0 6px}
  .col-by{font-size:13px;color:var(--text-secondary)}
  .col-by b{color:var(--text-primary);font-weight:500}
  .col-desc{font-size:13px;color:var(--text-secondary);line-height:1.55;margin-top:10px}
  .col-actbar{display:flex;align-items:center;gap:8px;margin-top:16px}
  .col-actbar .spacer{flex:1}
  .seg-toggle{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--border-default);border-radius:2px;overflow:hidden;flex-shrink:0;margin:16px 22px 0}
  .seg-toggle button{padding:9px 0;font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;background:#fff;border:0;color:var(--text-secondary);cursor:pointer;transition:all 150ms}
  .seg-toggle button:first-child{border-right:1px solid var(--border-default)}
  .seg-toggle button.on{background:#171717;color:#fff}
  .col-scroll{flex:1;overflow-y:auto;padding:18px 22px 40px}

  /* Itinerary days + timeline */
  .day{border:1px solid var(--border-default);border-radius:2px;margin-bottom:16px;overflow:hidden;background:#fff}
  .day-h{padding:12px 15px;background:var(--surface-muted);border-bottom:1px solid var(--border-default);display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  .day-h .t{font-size:14px;font-weight:600;letter-spacing:-.01em}
  .day-h .m{font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.04em;color:var(--text-secondary);white-space:nowrap}
  .day-body{padding:14px 15px 6px}
  .tl{position:relative}
  .tl::before{content:"";position:absolute;left:12px;top:14px;bottom:20px;width:2px;background:var(--border-default);z-index:0}
  .tl-stop{position:relative;padding:0 0 4px 40px;min-height:30px}
  .tl-stop .num{position:absolute;left:0;top:0;width:26px;height:26px;border-radius:9999px;background:#171717;color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;z-index:1}
  .stop-card{display:flex;gap:12px}
  .stop-thumb{width:54px;height:54px;flex-shrink:0;background-size:cover;background-position:center;background-color:var(--surface-muted)}
  .stop-main{min-width:0;flex:1}
  .stop-name{font-size:15px;font-weight:600;letter-spacing:-.01em;line-height:1.15;display:flex;align-items:center;gap:8px}
  .stop-sub{font-size:12px;color:var(--text-secondary);margin-top:3px}
  .stop-note{font-size:12.5px;color:var(--text-secondary);font-style:italic;line-height:1.5;margin:8px 0 0;padding-left:11px;border-left:2px solid var(--border-default)}
  .tl-seg{position:relative;padding:8px 0 8px 40px}
  .tl-seg .sico{position:absolute;left:2px;top:6px;width:22px;height:22px;border-radius:9999px;background:#fff;border:1px solid var(--border-default);display:flex;align-items:center;justify-content:center;color:var(--text-secondary);z-index:1}
  .seg-txt{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text-disabled);display:flex;align-items:center;gap:8px;height:22px}
  .seg-txt .d{font-family:'Space Mono',monospace;letter-spacing:.02em}
  .day-add{width:100%;padding:9px 0;border:1px dashed var(--border-strong);border-radius:2px;background:#fff;color:var(--text-secondary);font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;margin:2px 0 14px}
  .day-add:hover{border-color:#171717;color:var(--text-primary)}

  /* Map legend */
  .map-legend{position:absolute;top:16px;left:16px;background:rgba(255,255,255,.94);border:1px solid var(--border-default);border-radius:2px;padding:12px 14px;z-index:5;min-width:172px}
  .map-legend .h{font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:9px}
  .map-legend .row{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text-primary);padding:3px 0}
  .map-legend .row .mono{font-family:'Space Mono',monospace;font-size:11px;color:var(--text-secondary)}

  @media (max-width:1100px){ .col-shell{grid-template-columns:1fr 360px} }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;
const { AppTopNav } = window.PlanoDesignSystem_e8d587;

const P = {
  plus:'<path d="M12 5v14"/><path d="M5 12h14"/>',
  settings:'<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>',
  route:'<circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/>',
  walk:'<path d="M13 4a1 1 0 1 0 2 0 1 1 0 1 0-2 0"/><path d="M7 21l3-6 1.5-1.5"/><path d="M6 12l3-2 2.5.8L14 14"/><path d="M14 21l-1.5-4 1-3"/>',
  car:'<path d="M19 17h2l-1.5-5.5a2 2 0 0 0-1.9-1.5H7.4a2 2 0 0 0-1.9 1.5L4 17h2"/><circle cx="7.5" cy="17.5" r="1.5"/><circle cx="16.5" cy="17.5" r="1.5"/><path d="M6 17h11"/>',
  bus:'<path d="M8 6v6"/><path d="M15 6v6"/><path d="M4 12h16"/><path d="M18 18h2a1 1 0 0 0 1-1v-5a8 8 0 0 0-16 0v5a1 1 0 0 0 1 1h2"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/>',
};
const Icon = ({name, size=18, style}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={style}
    dangerouslySetInnerHTML={{__html: P[name]}}/>
);
const Rating = ({n, size}) => {
  if (!n || n < 1) return null;
  return (
    <span className="rdots">{Array.from({length:n}).map((_,i)=><i key={i} className={`rdot ${size==='sm'?'sm':''}`}/>)}</span>
  );
};

const IMG = {
  barbican:"https://images.unsplash.com/photo-1460574283810-2aab119d8511?w=1000&q=80",
  natl:"https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=1000&q=80",
  balfron:"https://images.unsplash.com/photo-1486718448742-163732cd1544?w=1000&q=80",
  hayward:"https://images.unsplash.com/photo-1517263904808-5dc91e3e7044?w=1000&q=80",
  trellick:"https://images.unsplash.com/photo-1493397212122-2b85dda8106b?w=1000&q=80",
  economist:"https://images.unsplash.com/photo-1470004914212-05527e49370b?w=1000&q=80",
};

const STOPS = [
  {n:1, img:IMG.barbican, name:"Barbican Estate", sub:"Chamberlin, Powell & Bon · 1976", rating:3, x:45, y:37,
   note:"Start at Lakeside. The raised highwalk gives the best framing of Cromwell Tower before crowds arrive."},
  {n:2, img:IMG.natl, name:"National Theatre", sub:"Denys Lasdun · 1976", rating:3, x:51, y:52,
   note:"Cross the river via the Millennium Bridge — 12 min on foot along the South Bank."},
  {n:3, img:IMG.hayward, name:"Hayward Gallery", sub:"GLC Architects · 1968", rating:2, x:56, y:59},
];
const STOPS2 = [
  {n:4, img:IMG.trellick, name:"Trellick Tower", sub:"Ernő Goldfinger · 1972", rating:3, x:17, y:29,
   note:"Grade II* listed. Exterior only — it's residential. The service tower reads best from Golborne Road."},
  {n:5, img:IMG.balfron, name:"Balfron Tower", sub:"Ernő Goldfinger · 1967", rating:2, x:82, y:44},
  {n:6, img:IMG.economist, name:"Economist Building", sub:"Alison & Peter Smithson · 1964", rating:2, x:54, y:50},
];
const ALL_STOPS = [...STOPS, ...STOPS2];

const Segment = ({mode, time, dist}) => (
  <div className="tl-seg">
    <span className="sico"><Icon name={mode} size={13}/></span>
    <div className="seg-txt"><span>{mode==='walk'?'Walk':mode==='car'?'Drive':'Transit'}</span><span className="d">{time} · {dist}</span></div>
  </div>
);

const StopCard = ({s, onHover}) => (
  <div className="tl-stop" onMouseEnter={()=>onHover(s.n)}>
    <span className="num">{s.n}</span>
    <div className="stop-card">
      <div className="stop-thumb" style={{backgroundImage:`url(${s.img})`}}/>
      <div className="stop-main">
        <div className="stop-name">{s.name} <Rating n={s.rating} size="sm"/></div>
        <div className="stop-sub">{s.sub}</div>
        {s.note && <p className="stop-note">{s.note}</p>}
      </div>
    </div>
  </div>
);

const Collection = () => {
  const [tab, setTab] = useState("itinerary");
  const [active, setActive] = useState(1);
  const mosaic = [IMG.barbican, IMG.trellick, IMG.natl, IMG.economist];

  return (
    <div className="col-shell">
      {/* Map */}
      <div className="map-col">
        <div className="map-canvas">
          <div className="map-road" style={{left:0,right:0,top:"52%",height:7,opacity:.95}}/>
          <div className="map-road" style={{top:0,bottom:0,left:"46%",width:7,opacity:.95}}/>
          <div className="map-road" style={{left:0,right:0,top:"28%",height:4,opacity:.7}}/>
          <div className="map-road" style={{top:0,bottom:0,left:"72%",width:4,opacity:.7}}/>
          <div className="map-road" style={{left:"10%",right:"20%",top:"70%",height:14,opacity:.5,transform:"rotate(-4deg)",background:"#DDE6E8"}}/>
        </div>
        {/* dashed route — one polyline per day */}
        <svg className="map-route" viewBox="0 0 100 100" preserveAspectRatio="none">
          <polyline points={STOPS.map(s=>`${s.x},${s.y}`).join(" ")}
            fill="none" stroke="#171717" strokeWidth="0.45" strokeDasharray="1.4 1.4" strokeLinecap="round" strokeLinejoin="round" opacity="0.6"/>
          <polyline points={STOPS2.map(s=>`${s.x},${s.y}`).join(" ")}
            fill="none" stroke="#171717" strokeWidth="0.45" strokeDasharray="1.4 1.4" strokeLinecap="round" strokeLinejoin="round" opacity="0.35"/>
        </svg>
        {ALL_STOPS.map(s=>(
          <div key={s.n} className={`pin ${active===s.n?'active':''}`} style={{left:`${s.x}%`,top:`${s.y}%`}} onClick={()=>setActive(s.n)}>
            <span className="num"><span>{s.n}</span></span>
            <span className="plabel">{s.name}</span>
          </div>
        ))}
        <div className="map-legend">
          <div className="h">2-day route</div>
          <div className="row"><span>Buildings</span><span className="mono">6</span></div>
          <div className="row"><span>Total distance</span><span className="mono">14.6 km</span></div>
          <div className="row"><span>On foot</span><span className="mono">3h 05m</span></div>
        </div>
        <div className="map-ctrls"><button>+</button><button>−</button></div>
        <div className="map-cap">MapLibre · 51.5074° N, 0.1278° W</div>
      </div>

      {/* Sidebar */}
      <div className="col-side">
        <div className="col-mosaic">
          {mosaic.map((u,i)=><div key={i} className="cell" style={{backgroundImage:`url(${u})`}}/>)}
        </div>
        <div className="col-head">
          <div className="eyebrow">Collection · 6 buildings</div>
          <h1 className="col-title">Brutalist gems of London</h1>
          <div className="col-by">By <b>jaimenoain</b> · 2-day itinerary</div>
          <p className="col-desc">Concrete at its most uncompromising — a walking route through the estates, theatres and towers that made London the capital of Brutalism.</p>
          <div className="col-actbar">
            <button className="btn btn-primary btn-sm"><Icon name="route" size={15}/> Plan route</button>
            <div className="spacer"/>
            <button className="icon-btn" title="Add building"><Icon name="plus" size={17}/></button>
            <button className="icon-btn" title="Settings"><Icon name="settings" size={16}/></button>
          </div>
        </div>

        <div className="seg-toggle">
          <button className={tab==='items'?'on':''} onClick={()=>setTab('items')}>All items</button>
          <button className={tab==='itinerary'?'on':''} onClick={()=>setTab('itinerary')}>Itinerary</button>
        </div>

        <div className="col-scroll">
          {tab==='itinerary' ? (
            <>
              <div className="day">
                <div className="day-h"><span className="t">Day 1 · The City &amp; South Bank</span><span className="m">3 STOPS · 4.2 KM</span></div>
                <div className="day-body">
                  <div className="tl">
                    <StopCard s={STOPS[0]} onHover={setActive}/>
                    <Segment mode="walk" time="12 min" dist="0.9 km"/>
                    <StopCard s={STOPS[1]} onHover={setActive}/>
                    <Segment mode="walk" time="4 min" dist="0.3 km"/>
                    <StopCard s={STOPS[2]} onHover={setActive}/>
                  </div>
                </div>
              </div>

              <div className="day">
                <div className="day-h"><span className="t">Day 2 · West &amp; East ends</span><span className="m">3 STOPS · 10.4 KM</span></div>
                <div className="day-body">
                  <div className="tl">
                    <StopCard s={STOPS2[0]} onHover={setActive}/>
                    <Segment mode="bus" time="34 min" dist="7.1 km"/>
                    <StopCard s={STOPS2[1]} onHover={setActive}/>
                    <Segment mode="car" time="18 min" dist="3.3 km"/>
                    <StopCard s={STOPS2[2]} onHover={setActive}/>
                  </div>
                </div>
              </div>
              <button className="day-add"><Icon name="plus" size={13}/> Add a day</button>
            </>
          ) : (
            <div className="tl" style={{paddingLeft:0}}>
              {ALL_STOPS.map(s=>(
                <div key={s.n} className="stop-card" style={{padding:"14px 0",borderBottom:"1px solid var(--border-default)"}} onMouseEnter={()=>setActive(s.n)}>
                  <div className="stop-thumb" style={{backgroundImage:`url(${s.img})`,width:64,height:64}}/>
                  <div className="stop-main">
                    <div className="stop-name">{s.name} <Rating n={s.rating} size="sm"/></div>
                    <div className="stop-sub">{s.sub}</div>
                    {s.note && <p className="stop-note">{s.note}</p>}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

function App(){
  return (
    <div data-screen-label="Itinerary map">
      <AppTopNav activePath="/guides" userInitial="J"/>
      <Collection/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
