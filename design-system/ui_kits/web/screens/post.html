<!DOCTYPE html>
<!-- @dsCard group="UI Kit — Web" name="Post composer" subtitle="Rate & review / add to bucket list — award picker" viewport="1400x1600" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plano — Post composer</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../../../colors_and_type.css">
<link rel="stylesheet" href="../_shared/kit.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../../_ds_bundle.js"></script>
<script type="text/babel" src="../_shared/kit-lib.jsx"></script>
<style>
  /* inputs */
  .inp{width:100%;height:46px;border:1px solid var(--border-strong);background:#fff;border-radius:2px;padding:0 14px;font-size:15px;color:var(--text-primary);outline:none;transition:border 150ms}
  .inp:focus{border-color:#171717}
  .inp::placeholder{color:var(--text-disabled)}
  textarea.inp{height:auto;min-height:120px;padding:12px 14px;resize:none;line-height:1.6}

  /* award dots — only ever filled black; never an X-of-3 slot */
  .dot{width:16px;height:16px;border-radius:9999px;flex-shrink:0}
  .dot.on{background:var(--text-primary)}
  .award-pick{display:flex;gap:10px}
  .award-opt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:90px;padding:14px 8px;border:1px solid var(--border-default);border-radius:2px;background:var(--surface-card);cursor:pointer;transition:border-color 150ms,background 150ms}
  .award-opt:hover{border-color:var(--border-strong)}
  .award-opt.on{border-color:var(--text-primary);background:var(--surface-muted)}
  .award-dots{display:flex;gap:5px;align-items:center;min-height:14px}
  .award-name{font-size:12px;font-weight:500;color:var(--text-primary)}
  .award-desc{font-size:11px;color:var(--text-secondary)}

  /* ============ POST COMPOSER ============ */
  .pc-head{position:sticky;top:0;z-index:20;background:rgba(250,250,250,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border-default)}
  .pc-head-in{max-width:576px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 20px}
  .pc-close{width:34px;height:34px;border:0;background:none;display:flex;align-items:center;justify-content:center;color:var(--text-primary);cursor:pointer;border-radius:2px;margin-left:-8px}
  .pc-close:hover{background:var(--surface-muted)}
  .pc-title{font-size:13px;font-weight:500;letter-spacing:.02em}
  .pc-body{max-width:576px;margin:0 auto;padding:0 20px}
  .pc-cover{width:128px;aspect-ratio:2/3;background-size:cover;background-position:center;filter:grayscale(1);flex-shrink:0}
  .hairline{border-bottom:1px solid var(--border-default)}
  .seg{display:flex;gap:8px;padding:22px 0}
  .seg button{flex:1;height:42px;border-radius:2px;border:1px solid var(--border-default);background:var(--surface-muted);color:var(--text-secondary);font-size:13px;font-weight:500;cursor:pointer;transition:all 150ms}
  .seg button.on{background:#171717;color:#fff;border-color:#171717}
  .pc-chip{display:inline-flex;align-items:center;gap:8px;height:34px;padding:0 6px 0 12px;border:1px solid var(--border-default);border-radius:9999px;background:var(--surface-card);font-size:13px}
  .pc-chip .cx{width:22px;height:22px;border-radius:9999px;border:0;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-secondary)}
  .pc-chip .cx:hover{background:var(--surface-muted);color:var(--text-primary)}
  .pc-chip-add{display:inline-flex;align-items:center;gap:8px;height:34px;padding:0 12px;border:1px solid var(--border-default);border-radius:9999px;background:var(--surface-card);font-size:13px;color:var(--text-secondary);cursor:pointer}
  .pc-chip-add:hover{border-color:var(--border-strong);color:var(--text-primary)}
  .chip-av{width:22px;height:22px;border-radius:9999px;background-size:cover;background-position:center;filter:grayscale(1)}
  .vis-row{display:flex;align-items:center;gap:10px;padding:20px 0}
  .vis-pick{position:relative}
  .vis-menu{position:absolute;bottom:calc(100% + 8px);left:0;background:var(--surface-card);border:1px solid var(--border-default);border-radius:6px;box-shadow:0 8px 28px rgba(0,0,0,.12);overflow:hidden;min-width:180px;z-index:30}
  .vis-menu button{display:block;width:100%;text-align:left;padding:11px 16px;font-size:13px;background:none;border:0;cursor:pointer;color:var(--text-primary)}
  .vis-menu button:hover{background:var(--surface-muted)}
  .vis-menu button.on{font-weight:700}
  .cta-quiet{color:var(--text-secondary)}
  .cta-quiet:hover{color:var(--text-primary)}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

Object.assign(PLANO_ICONS, {
  pencil:'<path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/>',
});

const IMG = {
  barbican:"https://images.unsplash.com/photo-1470723710355-95304d8aece4?w=900&q=80",
  p2:"https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=200&q=80",
  p3:"https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=200&q=80",
};

const REC = [{av:IMG.p2,name:"marcusbuilt"},{av:IMG.p3,name:"concreteclara"}];
// Awards, not a rating. 0 (Interesting) is the default — saving a building already
// means it earned a place; 1–3 dots are honours reserved for standouts.
const AWARDS = [
  {n:0, name:"Interesting", desc:"Worth a look"},
  {n:1, name:"Impressive", desc:"Worth a detour"},
  {n:2, name:"Essential", desc:"Worth a journey"},
  {n:3, name:"Masterpiece", desc:"Once in a lifetime"},
];

const Post = () => {
  const [type, setType] = useState("review");
  const [rating, setRating] = useState(1);
  const [vis, setVis] = useState("public");
  const [menu, setMenu] = useState(false);
  const [recs, setRecs] = useState(REC);
  return (
    <div style={{paddingBottom:80}}>
      <div className="pc-head">
        <div className="pc-head-in">
          <button className="pc-close"><Icon name="x" size={20}/></button>
          <span className="pc-title">{type==="review"?"Rate & review":"Add to bucket list"}</span>
          <span style={{width:26}}/>
        </div>
      </div>
      <div className="pc-body">
        <div className="hairline" style={{display:"flex",gap:20,padding:"28px 0"}}>
          <div className="pc-cover" style={{backgroundImage:`url(${IMG.barbican})`}}/>
          <div style={{display:"flex",flexDirection:"column",justifyContent:"center"}}>
            <h2 style={{fontSize:24,fontWeight:700,letterSpacing:"-.02em",lineHeight:1.05,margin:0}}>Barbican Estate</h2>
            <p style={{fontSize:14,color:"var(--text-secondary)",margin:"6px 0 0"}}>Silk Street, London EC2</p>
            <p style={{fontSize:13,color:"var(--text-secondary)",margin:"10px 0 0"}}>Chamberlin, Powell &amp; Bon</p>
            <p style={{fontSize:13,color:"var(--text-secondary)",margin:"3px 0 0"}}>Completed 1976</p>
          </div>
        </div>

        <div className="seg">
          {[["review","Review"],["bucket_list","Bucket list"]].map(([k,l])=>(
            <button key={k} className={type===k?"on":""} onClick={()=>setType(k)}>{l}</button>
          ))}
        </div>

        {type==="review" && (
          <div className="hairline" style={{padding:"22px 0"}}>
            <p style={{fontSize:13,color:"var(--text-secondary)",margin:"0 0 4px"}}>Award <span style={{color:"var(--text-disabled)"}}>(optional)</span></p>
            <p style={{fontSize:12,color:"var(--text-disabled)",margin:"0 0 16px",maxWidth:"56ch",lineHeight:1.5}}>Dots are honours, not a score — like Michelin stars. Saving a building already means it caught your eye; a single dot is reserved for standouts.</p>
            <div className="award-pick">
              {AWARDS.map(o=>(
                <button key={o.n} className={`award-opt ${rating===o.n?"on":""}`} onClick={()=>setRating(o.n)}>
                  <span className="award-dots">
                    {Array.from({length:o.n}).map((_,i)=><span key={i} className="dot on" style={{width:14,height:14}}/>)}
                  </span>
                  <span className="award-name">{o.name}</span>
                  <span className="award-desc">{o.desc}</span>
                </button>
              ))}
            </div>
          </div>
        )}

        <div className="hairline" style={{padding:"22px 0"}}>
          <textarea className="inp" placeholder={type==="review"?"Write your thoughts…":"Why do you want to visit this?"} defaultValue={type==="review"?"A fortress of board-marked concrete that somehow feels generous. The elevated walkways reframe the city as a series of thresholds — you never quite arrive, you keep passing through.":""}/>
        </div>

        <div className="hairline" style={{padding:"22px 0"}}>
          <p style={{fontSize:13,color:"var(--text-secondary)",margin:"0 0 14px"}}>{type==="review"?"Anyone in particular that shouldn't miss this?":"I'd like to visit this with…"}</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:10,alignItems:"center"}}>
            {recs.map(r=>(
              <span key={r.name} className="pc-chip">
                <span className="chip-av" style={{backgroundImage:`url(${r.av})`}}/>
                {r.name}
                <button className="cx" onClick={()=>setRecs(recs.filter(x=>x.name!==r.name))}><Icon name="x" size={13}/></button>
              </span>
            ))}
            <button className="pc-chip-add"><Icon name="plus" size={14}/> Add</button>
          </div>
        </div>

        <div className="vis-row">
          <span style={{fontSize:12,color:"var(--text-secondary)"}}>Visibility: <span style={{color:"var(--text-primary)",fontWeight:500,textTransform:"capitalize"}}>{vis}</span></span>
          <div className="vis-pick">
            <button style={{width:26,height:26,border:0,background:"none",cursor:"pointer",color:"var(--text-disabled)",display:"flex",alignItems:"center"}} onClick={()=>setMenu(!menu)}><Icon name="pencil" size={13}/></button>
            {menu && (
              <div className="vis-menu">
                {["public","contacts","private"].map(v=>(
                  <button key={v} className={vis===v?"on":""} onClick={()=>{setVis(v);setMenu(false);}} style={{textTransform:"capitalize"}}>{v}</button>
                ))}
              </div>
            )}
          </div>
        </div>

        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16,paddingTop:12}}>
          <button className="btn btn-primary" style={{width:"100%"}}>Save</button>
          <button className="cta cta-quiet" style={{fontSize:13,letterSpacing:0,textTransform:"none"}}>Cancel</button>
        </div>
      </div>
    </div>
  );
};

function App(){
  return (
    <div data-screen-label="Post composer">
      <Post/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
