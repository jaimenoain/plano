<!DOCTYPE html>
<!-- @dsCard group="UI Kit — Web" name="Plano Web — Onboarding, Post & Credits" subtitle="Onboarding · Post · Visit log · Guides · Architect · Practice" viewport="1400x3200" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plano — Onboarding, Post &amp; Credits</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html,body,#root{margin:0;padding:0;background:var(--surface-default);min-height:100vh}
  *{box-sizing:border-box}
  button{font-family:inherit}
  a{color:inherit;text-decoration:none}
  img{display:block;max-width:100%}
  input,textarea,select{font-family:inherit}

  /* ---- Kit chrome ---- */
  .chrome-tabs{position:sticky;top:0;z-index:60;background:rgba(250,250,250,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border-default)}
  .chrome-inner{max-width:1360px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 32px}
  .tabs{display:flex;gap:4px;flex-wrap:wrap}
  .tab{font-size:11px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;padding:8px 14px;background:none;border:0;color:var(--text-secondary);cursor:pointer;border-radius:2px}
  .tab:hover{color:var(--text-primary)}
  .tab.active{background:#171717;color:#fff}
  .chrome-right{display:flex;gap:10px;align-items:center}
  .avatar{width:28px;height:28px;border-radius:9999px;background:#262626;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
  .bell{position:relative;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--text-primary);cursor:pointer;border-radius:2px}
  .bell:hover{background:var(--surface-muted)}
  .bell .dot{position:absolute;top:7px;right:8px;width:7px;height:7px;border-radius:9999px;background:var(--brand-accent);border:1.5px solid var(--surface-default)}

  /* ---- Buttons ---- */
  .btn{height:44px;padding:0 18px;border-radius:2px;font-size:14px;font-weight:500;cursor:pointer;border:1px solid transparent;display:inline-flex;align-items:center;justify-content:center;gap:8px;line-height:1;transition:background 150ms,color 150ms}
  .btn-primary{background:#BEFF00;color:#171717}
  .btn-primary:hover{background:#9ACC00}
  .btn-outline{background:#fff;color:#171717;border-color:var(--border-strong)}
  .btn-outline:hover{background:var(--surface-muted)}
  .btn-dark{background:#171717;color:#fff}
  .btn-dark:hover{background:#000}
  .btn-block{width:100%}
  .btn-sm{height:34px;padding:0 14px;font-size:12px}

  /* Editorial CTA */
  .cta{font-size:12px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:inherit;background:none;border:0;cursor:pointer;padding:0;display:inline-flex;align-items:center;gap:6px;transition:color 150ms}
  .cta:hover{color:var(--text-secondary)}
  .cta .ar{transition:transform 150ms}
  .cta:hover .ar{transform:translateX(3px);color:#BEFF00}
  .cta-quiet{color:var(--text-secondary)}
  .cta-quiet:hover{color:var(--text-primary)}

  .eyebrow{font-size:10px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--text-secondary)}
  .sec-label{font-size:10px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--text-secondary)}

  /* shells */
  .doc{max-width:896px;margin:0 auto;padding:0 32px}
  .doc-narrow{max-width:672px;margin:0 auto;padding:0 32px}
  .doc-wide{max-width:1200px;margin:0 auto;padding:0 32px}

  /* award dots — Michelin-style honours. Only ever render FILLED black dots.
     An empty / outlined ring must never appear: one dot beside two empty rings
     reads as "1 out of 3" (a bad score), the opposite of the intended honour. */
  .dot{width:16px;height:16px;border-radius:9999px;flex-shrink:0}
  .dot.on{background:var(--text-primary)}

  /* award picker (Post input) — discrete honour tiers, never X-of-3 slots */
  .award-pick{display:flex;gap:10px}
  .award-opt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:90px;padding:14px 8px;border:1px solid var(--border-default);border-radius:2px;background:var(--surface-card);cursor:pointer;transition:border-color 150ms,background 150ms}
  .award-opt:hover{border-color:var(--border-strong)}
  .award-opt.on{border-color:var(--text-primary);background:var(--surface-muted)}
  .award-dots{display:flex;gap:5px;align-items:center;min-height:14px}
  .award-name{font-size:12px;font-weight:500;color:var(--text-primary)}
  .award-desc{font-size:11px;color:var(--text-secondary)}

  /* inputs */
  .inp{width:100%;height:46px;border:1px solid var(--border-strong);background:#fff;border-radius:2px;padding:0 14px;font-size:15px;color:var(--text-primary);outline:none;transition:border 150ms}
  .inp:focus{border-color:#171717}
  .inp::placeholder{color:var(--text-disabled)}
  textarea.inp{height:auto;min-height:120px;padding:12px 14px;resize:none;line-height:1.6}
  .inp-icon{position:relative}
  .inp-icon .ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-secondary);pointer-events:none}
  .inp-icon .inp{padding-left:40px}
  .fld label{font-size:13px;font-weight:500;color:var(--text-primary);display:block;margin-bottom:8px}
  .fld .hint{font-size:11px;color:var(--text-secondary);margin-top:7px}

  /* ============ ONBOARDING ============ */
  .ob-wrap{min-height:calc(100vh - 61px);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:56px 16px 80px}
  .ob-card{width:100%;max-width:400px;background:var(--surface-card);border:1px solid var(--border-default);border-radius:2px;padding:32px}
  .ob-steps{display:flex;align-items:center;gap:6px;justify-content:center;margin-bottom:24px}
  .ob-step{height:3px;width:34px;border-radius:2px;background:var(--border-default)}
  .ob-step.on{background:var(--text-primary)}
  .ob-invite{display:flex;gap:12px;align-items:flex-start;text-align:left;border:1px solid var(--border-default);background:var(--surface-muted);border-radius:2px;padding:14px}
  .ob-check{width:18px;height:18px;border-radius:2px;border:1.5px solid var(--text-primary);background:var(--text-primary);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
  .ob-avatar-drop{width:104px;height:104px;border-radius:9999px;background-size:cover;background-position:center;background-color:var(--surface-muted);filter:grayscale(1);border:1px solid var(--border-default);margin:0 auto}
  .ob-upload{display:inline-flex;align-items:center;gap:8px;border:1.5px dashed var(--border-strong);border-radius:2px;padding:9px 16px;font-size:13px;color:var(--text-secondary);cursor:pointer;background:none;transition:border-color 150ms,color 150ms}
  .ob-upload:hover{border-color:var(--text-primary);color:var(--text-primary)}

  /* ============ POST COMPOSER ============ */
  .pc-head{position:sticky;top:61px;z-index:20;background:rgba(250,250,250,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border-default)}
  .pc-head-in{max-width:576px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 20px}
  .pc-close{width:34px;height:34px;border:0;background:none;display:flex;align-items:center;justify-content:center;color:var(--text-primary);cursor:pointer;border-radius:2px;margin-left:-8px}
  .pc-close:hover{background:var(--surface-muted)}
  .pc-title{font-size:13px;font-weight:500;letter-spacing:.02em}
  .pc-body{max-width:576px;margin:0 auto;padding:0 20px}
  .hairline{border-bottom:1px solid var(--border-default)}
  .seg{display:flex;gap:8px;padding:22px 0}
  .seg button{flex:1;height:42px;border-radius:2px;border:1px solid var(--border-default);background:var(--surface-muted);color:var(--text-secondary);font-size:13px;font-weight:500;cursor:pointer;transition:all 150ms}
  .seg button.on{background:#171717;color:#fff;border-color:#171717}
  .chip{display:inline-flex;align-items:center;gap:8px;height:34px;padding:0 6px 0 12px;border:1px solid var(--border-default);border-radius:9999px;background:var(--surface-card);font-size:13px}
  .chip .cx{width:22px;height:22px;border-radius:9999px;border:0;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-secondary)}
  .chip .cx:hover{background:var(--surface-muted);color:var(--text-primary)}
  .chip-av{width:22px;height:22px;border-radius:9999px;background-size:cover;background-position:center;filter:grayscale(1)}
  .vis-row{display:flex;align-items:center;gap:10px;padding:20px 0}
  .vis-pick{position:relative}
  .vis-menu{position:absolute;bottom:calc(100% + 8px);left:0;background:var(--surface-card);border:1px solid var(--border-default);border-radius:6px;box-shadow:0 8px 28px rgba(0,0,0,.12);overflow:hidden;min-width:180px;z-index:30}
  .vis-menu button{display:block;width:100%;text-align:left;padding:11px 16px;font-size:13px;background:none;border:0;cursor:pointer;color:var(--text-primary)}
  .vis-menu button:hover{background:var(--surface-muted)}
  .vis-menu button.on{font-weight:700}

  /* ============ VISIT LOG (review detail) ============ */
  .rv-sec-h{border-bottom:1px solid var(--text-primary);padding-bottom:10px;margin-bottom:32px;font-size:11px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--text-primary)}
  .rv-sec-h .num{font-family:var(--font-mono);color:var(--text-disabled);margin-right:10px}
  .rv-author{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
  .rv-id{display:flex;align-items:center;gap:12px}
  .rv-av{width:44px;height:44px;border-radius:9999px;background-size:cover;background-position:center;filter:grayscale(1);border:1px solid var(--border-default);flex-shrink:0}
  .rv-name{font-size:15px;font-weight:700;letter-spacing:-.01em}
  .rv-badge{font-size:11px;font-weight:500;padding:2px 8px;border:1px solid var(--border-default);border-radius:2px;color:var(--text-secondary)}
  .rv-time{font-size:12px;color:var(--text-secondary);margin-top:3px}
  .rv-body{font-size:20px;line-height:1.6;color:var(--text-primary);letter-spacing:-.01em;margin:26px 0}
  .rv-body p{margin:0 0 18px}
  .rv-body p:last-child{margin-bottom:0}
  .rv-bar{display:flex;align-items:center;gap:20px;padding:16px 0;border-top:1px solid var(--border-default);border-bottom:1px solid var(--border-default)}
  .rv-actn{display:inline-flex;align-items:center;gap:7px;background:none;border:0;cursor:pointer;font-size:13px;color:var(--text-secondary);padding:0;transition:color 150ms}
  .rv-actn:hover{color:var(--text-primary)}
  .rv-actn.liked{color:var(--text-primary)}
  .rv-likers{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-secondary);margin-top:14px}
  .rv-facepile{display:inline-flex}
  .rv-facepile i{width:20px;height:20px;border-radius:9999px;background-size:cover;background-position:center;border:1.5px solid var(--surface-default);margin-left:-6px;filter:grayscale(1)}
  .rv-facepile i:first-child{margin-left:0}
  .cmt{display:flex;gap:12px;padding:16px 0}
  .cmt-av{width:34px;height:34px;border-radius:9999px;background-size:cover;background-position:center;filter:grayscale(1);flex-shrink:0}
  .cmt-name{font-size:13px;font-weight:600}
  .cmt-when{font-size:11px;color:var(--text-disabled)}
  .cmt-text{font-size:14px;color:var(--text-primary);line-height:1.5;margin-top:3px}
  .cmt-like{font-size:11px;color:var(--text-secondary);background:none;border:0;cursor:pointer;display:inline-flex;align-items:center;gap:5px;margin-top:7px;padding:0}
  .cmt-like:hover{color:var(--text-primary)}
  .cmt-compose{display:flex;gap:12px;align-items:flex-start;padding-top:18px}
  .rv-bldg{display:block;position:relative;overflow:hidden}
  .rv-bldg-cap{position:absolute;left:16px;bottom:14px;right:16px;color:#fff;font-size:20px;font-weight:700;letter-spacing:-.02em;text-shadow:0 1px 12px rgba(0,0,0,.4)}
  .rv-meta{display:flex;align-items:flex-start;gap:9px;font-size:14px;color:var(--text-secondary);margin-top:12px}

  /* ============ GUIDES ============ */
  .g-sec{border-bottom:1px solid var(--border-default);padding:56px 0}
  .g-hero-h{font-size:clamp(44px,7vw,72px);font-weight:700;letter-spacing:-.045em;line-height:.94;margin:14px 0 0}
  .g-search{position:relative;max-width:440px;margin-top:32px}
  .g-search .inp{padding-left:44px;height:52px}
  .g-h2{font-size:26px;font-weight:600;letter-spacing:-.02em;margin:4px 0 0}
  .cont-tabs{display:flex;gap:8px;flex-wrap:wrap;margin:28px 0 32px}
  .cont-tab{min-height:40px;padding:0 16px;border-radius:2px;font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;background:none;border:1px solid var(--border-default);color:var(--text-secondary);transition:all 150ms}
  .cont-tab:hover{border-color:var(--border-strong);color:var(--text-primary)}
  .cont-tab.on{background:#171717;color:#fff;border-color:#171717}
  .city-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .city-card{cursor:pointer}
  .city-card .ph{width:100%;aspect-ratio:4/3;background-size:cover;background-position:center;filter:grayscale(1);transition:filter 200ms}
  .city-card:hover .ph{filter:grayscale(0)}
  .city-name{font-size:22px;font-weight:700;letter-spacing:-.02em;margin-top:12px}
  .city-sub{font-size:13px;color:var(--text-secondary);margin-top:3px}
  .loc-list{display:grid;grid-template-columns:1fr 1fr;column-gap:48px;border-top:1px solid var(--border-default);margin-top:32px}
  .loc-row{display:flex;align-items:baseline;justify-content:space-between;gap:16px;padding:14px 0;border-bottom:1px solid var(--border-default);cursor:pointer}
  .loc-row:hover .loc-city{color:var(--text-secondary)}
  .loc-city{font-size:16px;font-weight:500;transition:color 150ms}
  .loc-count{font-family:var(--font-mono);font-size:12px;color:var(--text-disabled)}
  .col-grid{display:grid;grid-template-columns:repeat(3,1fr);column-gap:40px;row-gap:0}
  .col-card{border-bottom:1px solid var(--border-default);padding:24px 0;cursor:pointer}
  .col-card .ph{width:100%;aspect-ratio:16/7;background-size:cover;background-position:center;filter:grayscale(1);transition:filter 200ms}
  .col-card:hover .ph{filter:grayscale(0)}
  .col-name{font-size:17px;font-weight:600;letter-spacing:-.01em;margin-top:14px}
  .col-sub{font-size:13px;color:var(--text-secondary);margin-top:4px}

  /* ============ CREDITS (person / company) ============ */
  .cr-head{border-bottom:1px solid var(--border-default);padding-bottom:40px}
  .cr-head-in{display:flex;flex-direction:row-reverse;align-items:flex-start;gap:48px}
  .cr-name{font-size:clamp(40px,6vw,64px);font-weight:700;letter-spacing:-.04em;line-height:.95;margin:0;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .cr-verify{color:var(--text-primary);flex-shrink:0}
  .cr-meta{display:flex;flex-wrap:wrap;gap:4px 18px;font-size:14px;color:var(--text-secondary);margin-top:18px}
  .cr-bio{max-width:640px;font-size:16px;line-height:1.7;color:var(--text-secondary);margin-top:18px}
  .cr-portrait{width:160px;height:160px;background-size:cover;background-position:center;filter:grayscale(1);border:1px solid var(--border-default);flex-shrink:0}
  .cr-portrait.round{border-radius:9999px}
  .cr-tier-h{font-size:10px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--text-secondary);margin:48px 0 6px}
  .credit{display:flex;gap:24px;padding:26px 0;border-bottom:1px solid var(--border-default)}
  .credit:last-child{border-bottom:0}
  .credit .ph{width:168px;aspect-ratio:4/3;background-size:cover;background-position:center;filter:grayscale(1);flex-shrink:0;cursor:pointer;transition:filter 200ms}
  .credit:hover .ph{filter:grayscale(0)}
  .credit-name{font-size:19px;font-weight:600;letter-spacing:-.01em}
  .credit-loc{font-size:14px;color:var(--text-secondary);margin-top:3px}
  .credit-tags{display:flex;flex-wrap:wrap;align-items:center;gap:8px 12px;margin-top:12px}
  .role-badge{font-size:11px;font-weight:500;padding:3px 9px;border:1px solid var(--border-default);border-radius:2px;color:var(--text-primary)}
  .credit-firm{font-size:13px;color:var(--text-secondary)}
  .credit-note{font-size:14px;line-height:1.6;color:var(--text-secondary);margin-top:12px;max-width:60ch}
  .team-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border-default);cursor:pointer}
  .team-row:last-child{border-bottom:0}
  .team-av{width:40px;height:40px;border-radius:9999px;background-size:cover;background-position:center;filter:grayscale(1);flex-shrink:0}
  .team-name{font-size:14px;font-weight:500}
  .team-role{font-size:12px;color:var(--text-secondary);margin-top:2px}
</style>
</head>

<div id="root"></div>

<script type="text/babel">
const { useState } = React;

  <svg viewBox="0 0 338 74" style={style} aria-label="Plano">

const P = {

  heart:'<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>',
  message:'<path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/>',

              <div className="col-sub">{c.sub}</div>
            </div>
          ))}
        </div>
      </section>

      <section style={{padding:"56px 0"}}>
        <div style={{display:"flex",alignItems:"center",gap:32,justifyContent:"space-between",flexWrap:"wrap"}}>
          <div>
            <div className="sec-label">Start exploring</div>
            <h2 style={{fontSize:22,fontWeight:600,letterSpacing:"-.02em",margin:"6px 0 4px"}}>Create your own guide</h2>
            <p style={{fontSize:14,color:"var(--text-secondary)",margin:0}}>Build a collection, generate an itinerary, and share it with the world.</p>
          </div>
          <div style={{display:"flex",gap:28,flexShrink:0}}>
            <button className="cta">New collection <span className="ar">→</span></button>
            <button className="cta cta-quiet">Explore map <span className="ar">→</span></button>
          </div>
        </div>
      </section>
    </div>
  );
};

// ═══════════════ ARCHITECT (person) ═══════════════
const PRIMARY_CREDITS = [
  {name:"Barbican Estate",loc:"London, United Kingdom · Completed 1976",role:"Lead architect",firm:"Chamberlin, Powell & Bon",img:IMG.barbican,note:"Masterplan, towers, and the elevated pedestrian network across the 40-acre estate."},
  {name:"National Theatre",loc:"London, United Kingdom · Completed 1976",role:"Design architect",firm:"Denys Lasdun & Partners",img:IMG.concrete},
];
const CONTRIB_CREDITS = [
  {name:"Trellick Tower",loc:"London, United Kingdom · Completed 1972",role:"Consulting architect",firm:null,img:IMG.tower},
];
const Credit = ({c}) => (
  <article className="credit">
    <div className="ph" style={{backgroundImage:`url(${c.img})`}}/>
    <div style={{minWidth:0,flex:1}}>
      <div className="credit-name">{c.name}</div>
      <div className="credit-loc">{c.loc}</div>
      <div className="credit-tags">
        <span className="role-badge">{c.role}</span>
        {c.firm && <span className="credit-firm">{c.firm}</span>}
      </div>
      {c.note && <p className="credit-note">{c.note}</p>}
    </div>
  </article>
);
const Person = () => (
  <div className="doc" style={{paddingTop:44,paddingBottom:96}}>
    <button className="cta cta-quiet" style={{marginBottom:32}}>← Back</button>
    <header className="cr-head">
      <div className="cr-head-in">
        <div className="cr-portrait round" style={{backgroundImage:`url(${IMG.p6})`}}/>
        <div style={{minWidth:0,flex:1}}>
          <div style={{display:"flex",justifyContent:"space-between",gap:16,alignItems:"flex-start"}}>
            <h1 className="cr-name">Peter Chamberlin <span className="cr-verify"><Icon name="badge" size={30}/></span></h1>
            <button className="btn btn-outline btn-sm" style={{flexShrink:0}}><Icon name="pencil" size={14}/> Edit</button>
          </div>
          <div className="cr-meta"><span>British</span><span>1919–1978</span><span>London, United Kingdom</span></div>
          <button className="cta" style={{marginTop:16}}>Website <span className="ar" style={{transform:"none"}}><Icon name="external" size={12}/></span></button>
          <p className="cr-bio">Co-founder of Chamberlin, Powell &amp; Bon. Best known for the Barbican Estate and the Golden Lane Estate — dense, humane concrete cities-within-the-city that defined postwar London.</p>
        </div>
      </div>
    </header>

    <div style={{marginTop:36}}>
      <div className="sec-label">Credits</div>
      <div className="cr-tier-h">Primary credits</div>
      <div>{PRIMARY_CREDITS.map((c,i)=><Credit key={i} c={c}/>)}</div>
      <div className="cr-tier-h">Contributor credits</div>
      <div>{CONTRIB_CREDITS.map((c,i)=><Credit key={i} c={c}/>)}</div>
    </div>
  </div>
);

// ═══════════════ PRACTICE (company) ═══════════════
const FIRM_WORKS = [
  {name:"Barbican Estate",loc:"London, United Kingdom · Completed 1976",role:"Architect of record",firm:null,img:IMG.barbican},
  {name:"Golden Lane Estate",loc:"London, United Kingdom · Completed 1962",role:"Architect of record",firm:null,img:IMG.brutal},
  {name:"University of Leeds Roger Stevens Building",loc:"Leeds, United Kingdom · Completed 1970",role:"Architect of record",firm:null,img:IMG.museum},
];
const FIRM_TEAM = [
  {av:IMG.p6,name:"Peter Chamberlin",role:"Founding partner",verified:true},
  {av:IMG.p1,name:"Geoffry Powell",role:"Founding partner"},
  {av:IMG.p3,name:"Christoph Bon",role:"Founding partner"},
];
const Company = () => (
  <div className="doc" style={{paddingTop:44,paddingBottom:96}}>
    <button className="cta cta-quiet" style={{marginBottom:32}}>← Back</button>
    <header className="cr-head">
      <div className="cr-head-in">
        <div className="cr-portrait" style={{backgroundImage:`url(${IMG.concrete})`}}/>
        <div style={{minWidth:0,flex:1}}>
          <div style={{display:"flex",justifyContent:"space-between",gap:16,alignItems:"flex-start"}}>
            <h1 className="cr-name">Chamberlin, Powell &amp; Bon <span className="cr-verify"><Icon name="badge" size={30}/></span></h1>
            <button className="btn btn-outline btn-sm" style={{flexShrink:0}}><Icon name="pencil" size={14}/> Edit</button>
          </div>
          <div className="cr-meta"><span>Architecture practice</span><span>Founded 1952</span><span>London, United Kingdom</span></div>
          <button className="cta" style={{marginTop:16}}>Website <span className="ar" style={{transform:"none"}}><Icon name="external" size={12}/></span></button>
          <p className="cr-bio">London practice founded by three RIBA-medal architects who won the Golden Lane competition in 1952. Their work fused CIAM-era planning with a tactile, board-marked concrete language that shaped a generation of British public housing.</p>
        </div>
      </div>
    </header>

    <div style={{marginTop:36}}>
      <div className="sec-label" style={{marginBottom:6}}>People</div>
      <div>
        {FIRM_TEAM.map((t,i)=>(
          <div key={i} className="team-row">
            <div className="team-av" style={{backgroundImage:`url(${t.av})`}}/>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <span className="team-name">{t.name}</span>
                {t.verified && <span style={{color:"var(--text-primary)",display:"flex"}}><Icon name="badge" size={14}/></span>}

              <div className="team-role">{t.role}</div>

            <span className="cta cta-quiet" style={{fontSize:11}}>View <span className="ar">→</span></span>
          </div>
        ))}
      </div>
    </div>

    <div style={{marginTop:24}}>
      <div className="cr-tier-h" style={{marginTop:40}}>Works · 3 buildings</div>
      <div>{FIRM_WORKS.map((c,i)=><Credit key={i} c={c}/>)}</div>
    </div>
  </div>
);

// ─── App ───
const App = () => {
  const [view, setView] = useState(() => localStorage.getItem("plano-obpc-view") || "onboarding");
  React.useEffect(()=>{ localStorage.setItem("plano-obpc-view", view); }, [view]);
  return (
    <div data-screen-label={`Plano · ${view}`}>
      <Chrome view={view} setView={setView}/>
      {view==="onboarding" && <Onboarding/>}
      {view==="post" && <Post/>}
      {view==="review" && <Review/>}
      {view==="guides" && <Guides/>}
      {view==="person" && <Person/>}
      {view==="company" && <Company/>}
    </div>
  );
};
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
