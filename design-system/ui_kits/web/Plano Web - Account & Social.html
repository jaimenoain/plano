<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plano — Account &amp; Social</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<style>
  html,body,#root{margin:0;padding:0;background:var(--surface-default);min-height:100vh}
  *{box-sizing:border-box}
  button{font-family:inherit}
  a{color:inherit;text-decoration:none}
  img{display:block;max-width:100%}
  input,textarea,select{font-family:inherit}

  /* ---- Kit chrome ---- */
  .chrome-tabs{position:sticky;top:0;z-index:60;background:rgba(250,250,250,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border-default)}
  .chrome-inner{max-width:1360px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 32px}
  .tabs{display:flex;gap:4px;flex-wrap:wrap}
  .tab{font-size:11px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;padding:8px 14px;background:none;border:0;color:var(--text-secondary);cursor:pointer;border-radius:2px}
  .tab:hover{color:var(--text-primary)}
  .tab.active{background:#171717;color:#fff}
  .chrome-right{display:flex;gap:10px;align-items:center}
  .avatar{width:28px;height:28px;border-radius:9999px;background:#262626;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
  .bell{position:relative;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--text-primary);cursor:pointer;border-radius:2px}
  .bell:hover{background:var(--surface-muted)}
  .bell .dot{position:absolute;top:7px;right:8px;width:7px;height:7px;border-radius:9999px;background:var(--brand-accent);border:1.5px solid var(--surface-default)}

  /* ---- Buttons ---- */
  .btn{height:44px;padding:0 18px;border-radius:2px;font-size:14px;font-weight:500;cursor:pointer;border:1px solid transparent;display:inline-flex;align-items:center;justify-content:center;gap:8px;line-height:1;transition:background 150ms,color 150ms}
  .btn-primary{background:#BEFF00;color:#171717}
  .btn-primary:hover{background:#9ACC00}
  .btn-outline{background:#fff;color:#171717;border-color:var(--border-strong)}
  .btn-outline:hover{background:var(--surface-muted)}
  .btn-dark{background:#171717;color:#fff}
  .btn-dark:hover{background:#000}
  .btn-sm{height:34px;padding:0 14px;font-size:12px}

  /* Editorial CTA */
  .cta{font-size:12px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:inherit;background:none;border:0;cursor:pointer;padding:0;display:inline-flex;align-items:center;gap:6px;transition:color 150ms}
  .cta:hover{color:var(--text-secondary)}
  .cta .ar{transition:transform 150ms}
  .cta:hover .ar{transform:translateX(3px);color:#BEFF00}

  .eyebrow{font-size:10px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--text-secondary)}
  .sec-label{font-size:10px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--text-secondary)}

  /* ============ shared page shell ============ */
  .doc{max-width:896px;margin:0 auto;padding:0 32px}
  .doc-narrow{max-width:672px;margin:0 auto;padding:0 32px}
  .page-h{padding:44px 0 40px;border-bottom:1px solid var(--border-default);display:flex;align-items:flex-end;justify-content:space-between;gap:16px}
  .page-title{font-size:clamp(40px,6vw,60px);font-weight:700;letter-spacing:-.035em;line-height:.92;margin:0}

  /* ============ NOTIFICATIONS ============ */
  .nt-seclabel{position:sticky;top:61px;background:var(--surface-default);z-index:5;padding:30px 0 12px;font-size:10px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--text-secondary)}
  .nt-row{display:flex;align-items:flex-start;gap:16px;padding:16px 0;border-bottom:1px solid var(--border-default);cursor:pointer;transition:background 150ms}
  .nt-row:hover{background:var(--surface-muted)}
  .nt-av-wrap{position:relative;flex-shrink:0;margin-top:2px}
  .nt-av{width:38px;height:38px;border-radius:9999px;background-size:cover;background-position:center;background-color:var(--surface-muted);filter:grayscale(1)}
  .nt-badge{position:absolute;bottom:-3px;right:-3px;width:18px;height:18px;border-radius:9999px;background:var(--surface-default);display:flex;align-items:center;justify-content:center}
  .nt-main{flex:1;min-width:0}
  .nt-title{font-size:14px;font-weight:700;letter-spacing:-.01em;color:var(--text-primary)}
  .nt-body{font-size:14px;color:var(--text-secondary);line-height:1.4;margin-top:2px}
  .nt-body b{color:var(--text-primary);font-weight:500}
  .nt-body i{font-style:italic}
  .nt-time{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-disabled);margin-top:7px}
  .nt-unread{width:6px;height:6px;background:var(--brand-accent);flex-shrink:0;margin-top:8px}
  .nt-more{padding:30px 0;}

  /* ============ CONNECT / user rows ============ */
  .cn-sec{padding:44px 0;border-bottom:1px solid var(--border-default)}
  .cn-sec:last-child{border-bottom:0}
  .ur{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 0;border-bottom:1px solid var(--border-default);cursor:pointer;transition:background 150ms}
  .ur:last-child{border-bottom:0}
  .ur:hover{background:var(--surface-muted)}
  .ur-id{display:flex;align-items:center;gap:14px;min-width:0}
  .ur-av{width:44px;height:44px;border-radius:9999px;background-size:cover;background-position:center;background-color:var(--surface-muted);filter:grayscale(1);flex-shrink:0;border:1px solid var(--border-default)}
  .ur-name{font-size:14px;font-weight:500;color:var(--text-primary)}
  .ur-mutual{font-size:12px;color:var(--text-secondary);margin-top:3px;display:flex;align-items:center;gap:8px}
  .facepile{display:inline-flex}
  .facepile i{width:18px;height:18px;border-radius:9999px;background-size:cover;background-position:center;border:1.5px solid var(--surface-default);margin-left:-6px;filter:grayscale(1)}
  .facepile i:first-child{margin-left:0}
  .ur-act{display:flex;align-items:center;gap:10px;flex-shrink:0}
  .star-btn{width:34px;height:34px;border-radius:2px;border:0;background:none;color:var(--text-secondary);display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
  .star-btn:hover{background:var(--surface-muted);color:var(--text-primary)}
  .star-btn.on{color:var(--feedback-warning,#F59E0B)}

  .metric-tabs{display:flex;border-bottom:1px solid var(--border-default);margin-top:22px}
  .metric-tab{padding:14px 22px 12px;border:0;border-bottom:2px solid transparent;background:none;cursor:pointer;text-align:left;margin-bottom:-1px}
  .metric-tab.on{border-bottom-color:#171717}
  .metric-tab .v{font-size:20px;font-weight:700;letter-spacing:-.02em;line-height:1;color:var(--text-disabled)}
  .metric-tab.on .v{color:var(--text-primary)}
  .metric-tab .l{font-size:10px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--text-disabled);margin-top:6px}
  .metric-tab.on .l{color:var(--text-secondary)}

  /* ============ SETTINGS ============ */
  .set-back{margin:36px 0 26px;font-size:11px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--text-secondary);background:none;border:0;cursor:pointer}
  .set-back:hover{color:var(--text-primary)}
  .set-h{font-size:clamp(34px,5vw,44px);font-weight:700;letter-spacing:-.03em;line-height:.95;margin:0}
  .set-sub{font-size:14px;color:var(--text-secondary);margin-top:12px}
  .set-fb{margin:36px 0;padding-bottom:36px;border-bottom:1px solid var(--border-default)}
  .set-fb a{font-size:11px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--text-primary)}
  .set-avatar-block{display:flex;flex-direction:column;align-items:center;gap:16px;margin:8px 0 36px}
  .set-avatar{width:96px;height:96px;border-radius:9999px;background-size:cover;background-position:center;background-color:var(--surface-muted);filter:grayscale(1);border:1px solid var(--border-default)}
  .set-sec{padding:32px 0;border-top:1px solid var(--border-default)}
  .set-sec:first-of-type{border-top:0;padding-top:0}
  .set-sec-h{font-size:10px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:24px}
  .field{margin-bottom:22px}
  .field:last-child{margin-bottom:0}
  .field label{font-size:13px;font-weight:500;color:var(--text-primary);display:block;margin-bottom:8px}
  .field .hint{font-size:12px;color:var(--text-secondary);margin-top:8px}
  .inp{width:100%;max-width:400px;height:44px;border:1px solid var(--border-strong);background:#fff;border-radius:2px;padding:0 14px;font-size:15px;color:var(--text-primary);outline:none;transition:border 150ms}
  .inp:focus{border-color:#171717}
  .inp.wide{max-width:100%}
  .inp::placeholder{color:var(--text-disabled)}
  textarea.inp{height:auto;min-height:104px;padding:12px 14px;resize:none;max-width:520px}
  .inp-icon{position:relative;max-width:400px}
  .inp-icon .ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-secondary);pointer-events:none}
  .inp-icon .inp{padding-left:38px}
  .set-manage-list{border-top:1px solid var(--border-default);border-bottom:1px solid var(--border-default)}
  .set-manage{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:20px 0;border-bottom:1px solid var(--border-default)}
  .set-manage:last-child{border-bottom:0}
  .set-manage h3{font-size:15px;font-weight:500;margin:0}
  .set-manage p{font-size:13px;color:var(--text-secondary);margin:4px 0 0}
  .set-actions{display:flex;justify-content:flex-end;padding:28px 0 0;border-top:1px solid var(--border-default);margin-top:8px}
</style>
</head>

<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const PlanoLogo = ({style}) => (

const Notifications = () => (
  <div className="doc">
    <div className="page-h">
      <h1 className="page-title">Notifications</h1>
      <button className="star-btn" title="Notification settings"><Icon name="settings" size={18}/></button>
    </div>
    <div className="nt-seclabel">New</div>
    {NEW_NT.map((n,i)=><NotifRow key={i} n={n}/>)}
    <div className="nt-seclabel">Earlier</div>
    {OLD_NT.map((n,i)=><NotifRow key={i} n={n}/>)}
    <div className="nt-more"><button className="cta">Load more <span className="ar">→</span></button></div>
  </div>
);

// ═══════════════ CONNECT ═══════════════
const Facepile = ({imgs, label}) => (
  <span className="ur-mutual">
    <span className="facepile">{imgs.map((u,i)=><i key={i} style={{backgroundImage:`url(${u})`}}/>)}</span>
    {label}
  </span>
);
const FollowBtn = ({back}) => {
  const [on, setOn] = useState(false);
  return (
    <button className={`btn btn-sm ${on?'btn-outline':'btn-dark'}`} style={{width:on?96:back?108:88}} onClick={(e)=>{e.stopPropagation();setOn(!on);}}>
      {on?"Following":back?"Follow back":"Follow"}
    </button>
  );
};
const UserRow = ({u, follow, back, star}) => {
  const [fav, setFav] = useState(u.close);
  return (
    <div className="ur">
      <div className="ur-id">
        <div className="ur-av" style={{backgroundImage:`url(${u.av})`}}/>
        <div style={{minWidth:0}}>
          <div className="ur-name">{u.name}</div>
          {u.mutualImgs ? <Facepile imgs={u.mutualImgs} label={u.mutual}/> : (u.sub && <div className="ur-mutual">{u.sub}</div>)}
        </div>
      </div>
      <div className="ur-act">
        {star && (
          <button className={`star-btn ${fav?'on':''}`} title="Close friend" onClick={(e)=>{e.stopPropagation();setFav(!fav);}}>
            {fav ? <StarFill size={18}/> : <Icon name="star" size={18}/>}
          </button>
        )}
        {follow && <FollowBtn back={back}/>}
      </div>
    </div>
  );
};

  return (
    <div className="doc">

      <section className="cn-sec">

      <section className="cn-sec">
        <div className="sec-label">Your contacts</div>
        <div className="metric-tabs">
          <button className={`metric-tab ${tab==='following'?'on':''}`} onClick={()=>setTab('following')}>
