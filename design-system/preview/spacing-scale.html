<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Spacing Scale" subtitle="4px base unit" viewport="720x360" -->
<html lang="en"><head><meta charset="UTF-8"><title>Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--surface-default);font-family:var(--font-sans)}
  .wrap{padding:24px}
  .row{display:grid;grid-template-columns:60px 1fr 80px;align-items:center;gap:16px;padding:6px 0}
  .token{font-family:var(--font-mono);font-size:11px;color:var(--text-secondary)}
  .bar{background:#171717;height:14px}
  .px{font-family:var(--font-mono);font-size:10px;color:var(--text-disabled);text-align:right}
  .eyebrow{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-secondary);font-weight:500;margin-bottom:10px}
</style></head>
<body><div class="wrap">
  <div class="eyebrow">Spacing scale — 4px base unit</div>
  <div class="row"><div class="token">space-1</div><div><div class="bar" style="width:4px"></div></div><div class="px">4px</div></div>
  <div class="row"><div class="token">space-2</div><div><div class="bar" style="width:8px"></div></div><div class="px">8px</div></div>
  <div class="row"><div class="token">space-3</div><div><div class="bar" style="width:12px"></div></div><div class="px">12px</div></div>
  <div class="row"><div class="token">space-4</div><div><div class="bar" style="width:16px"></div></div><div class="px">16px</div></div>
  <div class="row"><div class="token">space-6</div><div><div class="bar" style="width:24px"></div></div><div class="px">24px</div></div>
  <div class="row"><div class="token">space-8</div><div><div class="bar" style="width:32px"></div></div><div class="px">32px</div></div>
  <div class="row"><div class="token">space-12</div><div><div class="bar" style="width:48px"></div></div><div class="px">48px</div></div>
  <div class="row"><div class="token">space-16</div><div><div class="bar" style="width:64px"></div></div><div class="px">64px</div></div>
  <div class="row"><div class="token">space-24</div><div><div class="bar" style="width:96px"></div></div><div class="px">96px</div></div>
</div></body></html>
