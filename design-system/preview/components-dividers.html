<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Plano · Components · Section dividers</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #FAFAFA; }
  .frame { padding: 22px 28px 26px;}
  .head { display:flex; align-items:baseline; justify-content: space-between; margin-bottom: 18px;}
  .meta-h { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; color: var(--text-disabled); text-transform: uppercase;}

  .div-strong { display:flex; align-items: baseline; gap: 12px; padding-bottom: 8px; border-bottom: 1px solid #171717;}
  .div-strong .num { font-family: var(--font-mono); font-size: 11px; color: var(--text-disabled); letter-spacing: 0.06em;}
  .div-strong .lbl { font-size: 11px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-primary);}
  .div-strong .right { margin-left: auto; font-family: var(--font-mono); font-size: 10px; color: var(--text-disabled); letter-spacing: 0.06em; text-transform: uppercase;}

  .div-soft { display:flex; align-items: baseline; gap: 12px; padding-bottom: 8px; border-bottom: 1px solid #E5E5E5;}
  .div-soft .lbl { font-size: 11px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-secondary);}

  .div-mid { display:flex; align-items: center; gap: 16px; }
  .div-mid .lbl { font-size: 10px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-disabled);}
  .div-mid .line { flex: 1; height: 1px; background: #E5E5E5;}

  .gap { height: 30px; }
</style>
</head>
<body>
<div class="frame">
  <div class="head">
    <span class="eyebrow">Section dividers · three weights</span>
    <span class="meta-h">use the strong one sparingly</span>
  </div>

  <div class="div-strong">
    <span class="num">§ 01</span>
    <span class="lbl">Highlights</span>
    <span class="right">8 buildings</span>
  </div>
  <div class="gap"></div>

  <div class="div-soft">
    <span class="lbl">Standard section</span>
  </div>
  <div class="gap"></div>

  <div class="div-mid">
    <span class="lbl">Or</span>
    <span class="line"></span>
    <span class="lbl">Centre rule</span>
    <span class="line"></span>
    <span class="lbl">For interleaving</span>
  </div>
</div>
</body>
</html>
