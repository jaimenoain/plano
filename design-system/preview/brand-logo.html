  html, body { margin: 0; padding: 0; background: #FAFAFA; }
  .frame { padding: 0;}
  .grid { display: grid; grid-template-columns: 1fr 1fr; min-height: 230px;}
  .panel { padding: 30px; display: flex; flex-direction: column; justify-content: space-between;}
  .panel.light { background: #FAFAFA;}
  .panel.dark { background: #000000;}
  .panel .h { display: flex; align-items: baseline; justify-content: space-between;}
  .panel .h .e { font-size: 11px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase;}
  .panel .h .m { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;}
  .panel.light .h .e { color: var(--text-primary);}
  .panel.light .h .m { color: var(--text-disabled);}
  .panel.dark  .h .e { color: #FFFFFF;}
  .panel.dark  .h .m { color: rgba(255,255,255,0.55);}
  .logo { height: 56px; align-self: center;}
  .panel.light .logo { color: #171717;}
  .panel.dark  .logo { color: #FFFFFF;}
  .specs { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase;}
  .panel.light .specs { color: var(--text-secondary);}
  .panel.dark  .specs { color: rgba(255,255,255,0.55);}
</style>
</head>
