<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Semantic Colors" subtitle="Text & surface aliases" viewport="900x200" -->
<html lang="en"><head><meta charset="UTF-8"><title>Semantic Colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--surface-default);font-family:var(--font-sans)}
  .wrap{padding:24px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--border-default)}
  .cell{padding:14px 16px;border-right:1px solid var(--border-default)}
  .cell:last-child{border-right:0}
  .label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-secondary);font-weight:500}
  .val{font-family:var(--font-mono);font-size:11px;color:var(--text-primary);margin-top:4px}
  .dot{width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:8px;border:1px solid var(--border-default)}
  .note{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-secondary);margin-bottom:12px;font-weight:500}
  .section{margin-top:16px}
</style></head>
<body><div class="wrap">
<div class="note">Semantic text & surface aliases</div>
<div class="grid">
  <div class="cell"><div class="label">text-primary</div><div class="val"><span class="dot" style="background:#171717"></span>#171717</div></div>
  <div class="cell"><div class="label">text-secondary</div><div class="val"><span class="dot" style="background:#525252"></span>#525252</div></div>
  <div class="cell"><div class="label">text-disabled</div><div class="val"><span class="dot" style="background:#A3A3A3"></span>#A3A3A3</div></div>
  <div class="cell"><div class="label">text-inverse</div><div class="val"><span class="dot" style="background:#FFFFFF"></span>#FFFFFF</div></div>
</div>
<div class="grid section">
  <div class="cell"><div class="label">surface-default</div><div class="val"><span class="dot" style="background:#FAFAFA"></span>#FAFAFA</div></div>
  <div class="cell"><div class="label">surface-card</div><div class="val"><span class="dot" style="background:#FFFFFF"></span>#FFFFFF</div></div>
  <div class="cell"><div class="label">surface-muted</div><div class="val"><span class="dot" style="background:#F5F5F5"></span>#F5F5F5</div></div>
  <div class="cell"><div class="label">surface-inverse</div><div class="val"><span class="dot" style="background:#000000"></span>#000000</div></div>
</div>
</div></body></html>
