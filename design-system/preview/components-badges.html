<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Plano · Components · Badges &amp; tier ranks</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #FAFAFA; }
  .card { padding: 22px 26px; }
  .head { display:flex; align-items:baseline; justify-content: space-between; margin-bottom: 16px; }
  .meta { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; color: var(--text-disabled); text-transform: uppercase;}
  .grid { display: grid; grid-template-columns: 110px 1fr; gap: 12px 18px; align-items: center;}
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-disabled); letter-spacing: 0.06em; text-transform: uppercase;}
  .row { display:flex; gap: 8px; flex-wrap: wrap; align-items: center;}
  .badge { display:inline-flex; align-items:center; gap: 4px; padding: 2px 8px; border-radius: 2px; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; border: 1px solid transparent;}
  .badge svg { width: 11px; height: 11px; stroke-width: 2; fill: none; stroke: currentColor;}
  .b-default { background: #F5F5F5; color: #171717; border-color: #E5E5E5;}
  .b-outline { background: transparent; color: #171717; border-color: #E5E5E5;}
  .b-success { background: rgba(22,163,74,0.10); color: #16A34A;}
  .b-warning { background: rgba(245,158,11,0.10); color: #B45309;}
  .b-destructive { background: rgba(239,68,68,0.10); color: #EF4444;}
  .t-1 { background: #171717; color: #FFFFFF; }
  .t-5 { background: #F5F5F5; color: #171717; border-color:#E5E5E5;}
  .t-10 { background: transparent; color: #525252; border-color: #E5E5E5;}
  .verified { display:inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; color: #171717; letter-spacing: 0.02em;}
  .verified svg { width: 14px; height: 14px; stroke: #171717; stroke-width: 2; fill: none;}
  .dot { display:inline-block; width: 6px; height: 6px; border-radius: 50%; background: #171717; vertical-align: middle;}
</style>
</head>
<body>
<div class="card">
  <div class="head">
    <span class="eyebrow">Badges · variants, tiers, verification</span>
    <span class="meta">uppercase · tracking 0.08em</span>
  </div>
  <div class="grid">
    <span class="lbl">Variant</span>
    <div class="row">
      <span class="badge b-default">Brutalism</span>
      <span class="badge b-outline">Residential</span>
      <span class="badge b-success">Visited</span>
      <span class="badge b-warning">Restricted</span>
      <span class="badge b-destructive">Lost</span>
    </div>
    <span class="lbl">Popularity tier</span>
    <div class="row">
      <span class="badge t-1">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
        Top 1% in Marseille
      </span>
      <span class="badge t-5">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12l4 6-10 13L2 9Z"/><path d="M11 3 8 9l4 13 4-13-3-6"/><path d="M2 9h20"/></svg>
        Top 5%
      </span>
      <span class="badge t-10">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></svg>
        Top 10%
      </span>
      <span class="badge b-default">Standard</span>
    </div>
    <span class="lbl">Verified</span>
    <div class="row">
      <span class="verified">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"/><path d="m9 12 2 2 4-4"/></svg>
        Verified architect
      </span>
      <span class="verified"><span class="dot"></span> Open to public</span>
      <span class="verified"><span class="dot" style="background:#A3A3A3"></span> Under construction</span>
    </div>
  </div>
</div>
</body>
</html>
