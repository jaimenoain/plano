<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Plano · Brand · Symbol &amp; app marks</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #FAFAFA; }
  .frame { padding: 24px 28px;}
  .head { display:flex; align-items:baseline; justify-content: space-between; margin-bottom: 22px;}
  .meta { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; color: var(--text-disabled); text-transform: uppercase;}
  .row { display: flex; gap: 28px; align-items: flex-end;}
  .ic { display: flex; flex-direction: column; align-items: center; gap: 8px;}
  .ic .tile { background: #000000; display: inline-flex; align-items: center; justify-content: center;}
  .ic .tile.light { background: #FFFFFF; border: 1px solid #E5E5E5;}
  .ic .tile svg { color: #FFFFFF;}
  .ic .tile.light svg { color: #171717;}
  .ic .label { font-family: var(--font-mono); font-size: 9px; color: var(--text-disabled); letter-spacing: 0.08em; text-transform: uppercase;}
  .s-96 { width: 96px; height: 96px; border-radius: 20px;}
  .s-64 { width: 64px; height: 64px; border-radius: 14px;}
  .s-40 { width: 40px; height: 40px; border-radius: 8px;}
  .s-28 { width: 28px; height: 28px; border-radius: 6px;}
  .s-20 { width: 20px; height: 20px; border-radius: 4px;}
  .s-96 svg, .s-64 svg, .s-40 svg, .s-28 svg, .s-20 svg { width: 55%;}
</style>
</head>
<body>
<div class="frame">
