<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Plano · Components · Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #FAFAFA; }
  .card { padding: 22px 26px; }
  .head { display:flex; align-items:baseline; justify-content: space-between; margin-bottom: 16px; }
  .meta { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; color: var(--text-disabled); text-transform: uppercase;}
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 24px;}
  .field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-primary); margin-bottom: 6px; }
  .input { width: 100%; box-sizing: border-box; height: 40px; padding: 0 12px; background: #F5F5F5; border: 1px solid #E5E5E5; border-radius: 2px; font-family: var(--font-sans); font-size: 14px; color: var(--text-primary); transition: border-color 120ms ease, box-shadow 120ms ease;}
  .input::placeholder { color: var(--text-disabled);}
  .input.focus { background: #FFFFFF; border-color: #171717; box-shadow: 0 0 0 2px #171717;}
  .input.hover { border-color: #A3A3A3;}
  .input.error { border-color: #EF4444; background: #FFFFFF;}
  .help { font-size: 11px; color: var(--text-secondary); margin-top: 6px;}
  .help.err { color: #EF4444;}
  .search { position: relative; }
  .search svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; stroke: var(--text-secondary); stroke-width: 2; fill: none;}
  .search .input { padding-left: 36px;}
</style>
</head>
<body>
<div class="card">
  <div class="head">
    <span class="eyebrow">Inputs · text, search, validation</span>
    <span class="meta">h-40 · radius 2 · F5F5F5 fill</span>
  </div>
  <div class="grid">
    <div class="field">
      <label>Building name</label>
      <input class="input" value="Unité d'Habitation" />
      <div class="help">Hover lifts border to A3A3A3.</div>
    </div>
    <div class="field">
      <label>City</label>
      <input class="input hover" placeholder="Search city, country…" />
      <div class="help">Hover state.</div>
    </div>
    <div class="field">
      <label>Slug</label>
      <input class="input focus" value="unite-dhabitation-marseille" />
      <div class="help">Focus: 2px brand-primary ring.</div>
    </div>
    <div class="field">
      <label>Year completed</label>
      <input class="input error" value="20247" />
      <div class="help err">Year is out of range.</div>
    </div>
    <div class="field" style="grid-column: 1 / -1;">
      <label>Search</label>
      <div class="search">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input class="input" placeholder="Building, architect, city…" />
      </div>
    </div>
  </div>
</div>
</body>
</html>
