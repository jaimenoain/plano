<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Plano · Components · Avatars &amp; facepile</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #FAFAFA; }
  .frame { padding: 22px 26px;}
  .head { display:flex; align-items:baseline; justify-content: space-between; margin-bottom: 16px;}
  .meta-h { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; color: var(--text-disabled); text-transform: uppercase;}
  .grid { display: grid; grid-template-columns: 100px 1fr; gap: 14px 22px; align-items: center;}
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-disabled); letter-spacing: 0.06em; text-transform: uppercase;}
  .row { display:flex; gap: 14px; align-items: center; flex-wrap: wrap;}
  .av { border-radius: 50%; background: #F5F5F5; border: 1px solid #E5E5E5; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; color: #171717;}
  .av.s-24 { width: 24px; height: 24px; font-size: 9px;}
  .av.s-32 { width: 32px; height: 32px; font-size: 11px;}
  .av.s-40 { width: 40px; height: 40px; font-size: 13px;}
  .av.s-56 { width: 56px; height: 56px; font-size: 18px;}
  .av.dark { background: #171717; color: #FFFFFF; border-color: #171717;}
  .av.grad-1 { background: linear-gradient(135deg, #525252, #171717); color: #fff; border-color: transparent;}
  .av.grad-2 { background: linear-gradient(135deg, #A3A3A3, #525252); color: #fff; border-color: transparent;}
  .facepile { display:inline-flex; align-items: center;}
  .facepile .av { margin-left: -8px; border: 2px solid #FAFAFA;}
  .facepile .av:first-child { margin-left: 0;}
  .facepile .more { margin-left: -8px; width: 32px; height: 32px; border-radius: 50%; background: #FFFFFF; border: 2px solid #FAFAFA; box-shadow: inset 0 0 0 1px #E5E5E5; display:inline-flex; align-items:center; justify-content:center; font-size: 10px; font-weight: 600; color: #525252;}
  .label { font-size: 12px; color: var(--text-secondary);}
  .label b { color: var(--text-primary); font-weight: 600;}
  .verified { position: relative;}
  .verified::after { content: ""; position: absolute; right: -2px; bottom: -2px; width: 14px; height: 14px; border-radius: 50%; background: #171717; border: 2px solid #FAFAFA;}
</style>
</head>
<body>
<div class="frame">
  <div class="head">
    <span class="eyebrow">Avatars · identity discs</span>
    <span class="meta-h">circular only · 4 sizes</span>
  </div>
  <div class="grid">
    <span class="lbl">Sizes</span>
    <div class="row">
      <div class="av s-24">L</div>
      <div class="av s-32">J</div>
      <div class="av s-40 dark">M</div>
      <div class="av s-56 grad-1">RP</div>
    </div>
    <span class="lbl">Verified</span>
    <div class="row">
      <div class="av s-40 grad-2 verified">Z</div>
      <span class="label"><b>Zaha Hadid Architects</b> · verified studio</span>
    </div>
    <span class="lbl">Facepile</span>
    <div class="row">
      <div class="facepile">
        <div class="av s-32">A</div>
        <div class="av s-32 dark">B</div>
        <div class="av s-32 grad-1">C</div>
        <div class="av s-32 grad-2">D</div>
        <span class="more">+12</span>
      </div>
      <span class="label">visited by friends</span>
    </div>
  </div>
</div>
</body>
</html>
