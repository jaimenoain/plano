<!DOCTYPE html>
<!-- @dsCard group="Type" name="Display Type" subtitle="Editorial hero + feed headline" viewport="900x260" -->
<html lang="en"><head><meta charset="UTF-8"><title>Display Type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--surface-default);font-family:var(--font-sans)}
  .wrap{padding:32px 28px}
  .eyebrow{
    font-size:10px;letter-spacing:.15em;text-transform:uppercase;
    color:var(--text-secondary);font-weight:500;
    margin-bottom:18px;
  }
  .display{
    font-size:76px;font-weight:700;letter-spacing:-0.035em;
    line-height:.95;color:var(--text-primary);
    margin:0;
  }
  .foot{
    margin-top:24px;padding-top:14px;
    border-top:1px solid var(--border-default);
    display:flex;justify-content:space-between;align-items:baseline;gap:24px;
    font-family:var(--font-mono);font-size:10px;
    color:var(--text-disabled);letter-spacing:.04em;
  }
  .foot .left{color:var(--text-secondary)}
</style></head>
<body><div class="wrap">
  <div class="eyebrow">Display headline · editorial hero</div>
  <h1 class="display">The world's architecture, cataloged.</h1>
  <div class="foot">
    <span class="left">Inter · 76 · 700 · −0.035em · 0.95</span>
    <span>fs-7xl</span>
  </div>
</div></body></html>
