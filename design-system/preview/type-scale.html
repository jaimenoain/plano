<!DOCTYPE html>
<!-- @dsCard group="Type" name="Type Scale" subtitle="7xl → 2xs scale on Inter" viewport="720x440" -->
<html lang="en"><head><meta charset="UTF-8"><title>Type Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--surface-default);font-family:var(--font-sans)}
  .wrap{padding:24px}
  .row{display:grid;grid-template-columns:100px 1fr auto;align-items:baseline;gap:24px;padding:10px 0;border-bottom:1px solid var(--border-default)}
  .token{font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);letter-spacing:.05em}
  .spec{font-family:var(--font-mono);font-size:10px;color:var(--text-disabled)}
  .s{color:var(--text-primary)}
</style></head>
<body><div class="wrap">
  <div class="row"><div class="token">7xl</div><div class="s" style="font-size:54px;font-weight:700;letter-spacing:-.035em;line-height:1">Aa</div><div class="spec">72 · bold</div></div>
  <div class="row"><div class="token">6xl</div><div class="s" style="font-size:44px;font-weight:700;letter-spacing:-.03em;line-height:1">Aa</div><div class="spec">60 · bold</div></div>
  <div class="row"><div class="token">4xl</div><div class="s" style="font-size:34px;font-weight:700;letter-spacing:-.025em">Aa</div><div class="spec">40 · bold</div></div>
  <div class="row"><div class="token">3xl</div><div class="s" style="font-size:28px;font-weight:600;letter-spacing:-.02em">Aa</div><div class="spec">32 · semibold</div></div>
  <div class="row"><div class="token">2xl</div><div class="s" style="font-size:22px;font-weight:600">Aa</div><div class="spec">24 · semibold</div></div>
  <div class="row"><div class="token">xl</div><div class="s" style="font-size:18px;font-weight:600">Aa</div><div class="spec">20 · semibold</div></div>
  <div class="row"><div class="token">base</div><div class="s" style="font-size:16px">Aa</div><div class="spec">16 · regular</div></div>
  <div class="row"><div class="token">sm</div><div class="s" style="font-size:14px">Aa</div><div class="spec">14 · regular</div></div>
  <div class="row"><div class="token">xs</div><div class="s" style="font-size:12px">Aa</div><div class="spec">12 · regular</div></div>
  <div class="row"><div class="token">2xs</div><div class="s" style="font-size:10px;letter-spacing:.08em;text-transform:uppercase">Aa</div><div class="spec">10 · medium · caps</div></div>
</div></body></html>
