<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Plano · Color · Primary palette</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #FAFAFA; }
  .card { padding: 22px 24px; }
  .row { display: grid; grid-template-columns: repeat(12, 1fr); gap: 0; border-top: 1px solid var(--border-default); }
  .swatch { aspect-ratio: 1 / 1.05; position: relative; display:flex; flex-direction:column; justify-content: space-between; padding: 10px 10px 9px; }
  .swatch + .swatch { border-left: 1px solid rgba(0,0,0,0.08); }
  .swatch .step { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; }
  .swatch .hex  { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.04em; text-align: right; }
  .label-bar { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .label-bar .eyebrow { color: var(--text-primary); }
  .label-bar .meta    { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; color: var(--text-disabled); text-transform: uppercase;}
</style>
</head>
<body>
<div class="card">
  <div class="label-bar">
    <span class="eyebrow">Neutrals · the working palette</span>
    <span class="meta">11 steps · palette-neutral-{step}</span>
  </div>
  <div class="row">
    <div class="swatch" style="background:#FAFAFA"><span class="step" style="color:#171717">50</span><span class="hex" style="color:#171717">#FAFAFA</span></div>
    <div class="swatch" style="background:#F5F5F5"><span class="step" style="color:#171717">100</span><span class="hex" style="color:#171717">#F5F5F5</span></div>
    <div class="swatch" style="background:#E5E5E5"><span class="step" style="color:#171717">200</span><span class="hex" style="color:#171717">#E5E5E5</span></div>
    <div class="swatch" style="background:#D4D4D4"><span class="step" style="color:#171717">300</span><span class="hex" style="color:#171717">#D4D4D4</span></div>
    <div class="swatch" style="background:#A3A3A3"><span class="step" style="color:#171717">400</span><span class="hex" style="color:#171717">#A3A3A3</span></div>
    <div class="swatch" style="background:#737373"><span class="step" style="color:#FAFAFA">500</span><span class="hex" style="color:#FAFAFA">#737373</span></div>
    <div class="swatch" style="background:#525252"><span class="step" style="color:#FAFAFA">600</span><span class="hex" style="color:#FAFAFA">#525252</span></div>
    <div class="swatch" style="background:#404040"><span class="step" style="color:#FAFAFA">700</span><span class="hex" style="color:#FAFAFA">#404040</span></div>
    <div class="swatch" style="background:#262626"><span class="step" style="color:#FAFAFA">800</span><span class="hex" style="color:#FAFAFA">#262626</span></div>
    <div class="swatch" style="background:#171717"><span class="step" style="color:#FAFAFA">900</span><span class="hex" style="color:#FAFAFA">#171717</span></div>
    <div class="swatch" style="background:#0A0A0A"><span class="step" style="color:#FAFAFA">950</span><span class="hex" style="color:#FAFAFA">#0A0A0A</span></div>
    <div class="swatch" style="background:#000000"><span class="step" style="color:#FAFAFA">000</span><span class="hex" style="color:#FAFAFA">#000000</span></div>
  </div>
</div>
</body>
</html>
