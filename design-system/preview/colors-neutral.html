<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Neutral Scale" subtitle="Page → card → border → text" viewport="900x160" -->
<html lang="en"><head><meta charset="UTF-8"><title>Neutral Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--surface-default);font-family:var(--font-sans)}
  .wrap{padding:24px}
  .row{display:grid;grid-template-columns:repeat(11,1fr);gap:0}
  .swatch{display:flex;flex-direction:column;align-items:stretch}
  .chip{height:64px;border-right:1px solid var(--border-default)}
  .swatch:first-child .chip{border-left:1px solid var(--border-default)}
  .chip.edge{border-top:1px solid var(--border-default);border-bottom:1px solid var(--border-default)}
  .name{font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);margin-top:6px;text-align:center}
  .hex{font-family:var(--font-mono);font-size:9px;color:var(--text-disabled);margin-top:1px;text-align:center}
  .note{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-secondary);margin-bottom:12px;font-weight:500}
</style></head>
<body><div class="wrap">
<div class="note">Neutral scale — page · cards · borders · text</div>
<div class="row">
  <div class="swatch"><div class="chip edge" style="background:#FAFAFA"></div><div class="name">50</div><div class="hex">FAFAFA</div></div>
  <div class="swatch"><div class="chip edge" style="background:#F5F5F5"></div><div class="name">100</div><div class="hex">F5F5F5</div></div>
  <div class="swatch"><div class="chip edge" style="background:#E5E5E5"></div><div class="name">200</div><div class="hex">E5E5E5</div></div>
  <div class="swatch"><div class="chip edge" style="background:#D4D4D4"></div><div class="name">300</div><div class="hex">D4D4D4</div></div>
  <div class="swatch"><div class="chip edge" style="background:#A3A3A3"></div><div class="name">400</div><div class="hex">A3A3A3</div></div>
  <div class="swatch"><div class="chip edge" style="background:#737373"></div><div class="name">500</div><div class="hex">737373</div></div>
  <div class="swatch"><div class="chip edge" style="background:#525252"></div><div class="name">600</div><div class="hex">525252</div></div>
  <div class="swatch"><div class="chip edge" style="background:#404040"></div><div class="name">700</div><div class="hex">404040</div></div>
  <div class="swatch"><div class="chip edge" style="background:#262626"></div><div class="name">800</div><div class="hex">262626</div></div>
  <div class="swatch"><div class="chip edge" style="background:#171717"></div><div class="name">900</div><div class="hex">171717</div></div>
  <div class="swatch"><div class="chip edge" style="background:#0A0A0A"></div><div class="name">950</div><div class="hex">0A0A0A</div></div>
</div>
</div></body></html>
