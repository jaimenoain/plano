# Advisory checks — these run and report but NEVER block a merge.
# Promotion policy (docs/decisions/0001-repo-guardrails.md): once a job has
# been green for 2+ weeks, consider moving it into ci.yml as blocking.
#
# The per-PR AI review that used to live here (claude-review) was removed in
# favour of the nightly scheduled review (.github/workflows/nightly.yml) —
# see docs/decisions/0006-nightly-heavy-tier.md. On-demand reviews are still
# available by commenting "@claude ..." on a PR (ai-review.yml).
name: Advisory

on:
  pull_request:

concurrency:
  group: advisory-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Note: `npm audit --audit-level=high --omit=dev` is now a BLOCKING job in
  # ci.yml (the `audit` job), promoted once the Expo transitive highs were
  # removed with apps/mobile (ADR-0005). It is deliberately not duplicated here.

  # Flags newly-introduced vulnerable or malicious dependencies on the PR diff.
  # Requires the Dependency graph (Settings → Advanced Security) — enabled for
  # this repo on 2026-07-16; if the job ever reports "Dependency review is not
  # supported on this repository", that setting was switched off again.
  # Works out of the box on PUBLIC repos. On a PRIVATE repo the action requires
  # GitHub Advanced Security and hard-errors ("Dependency review is not supported
  # on this repository"), so it is skipped there — a job that can never pass is
  # not a signal, it is noise that trains everyone to ignore the advisory tier.
  # Turned GHAS on for a private repo? Delete the `if:` line and the job runs.
  dependency-review:
    if: ${{ github.event.repository.private == false }}
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
