name: AI review

# Advisory reviewer: posts inline comments + a verdict on every PR. Never blocks
# merge (not in the required checks). Runs once when the PR opens (or leaves
# draft) to keep API cost at one review per PR; push more commits and want a
# fresh pass? Re-request by commenting "@claude review the latest changes".
on:
  pull_request:
    types: [opened, ready_for_review]
  issue_comment:
    types: [created]

concurrency:
  group: ai-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  review:
    name: Claude review
    # Run on non-draft PRs, or on PR comments that mention @claude.
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@ba0aafd4308cbba7165f9f2cdb0cfbed5a3c99ce # v1
        continue-on-error: true
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request as a senior engineer who knows this repo's rules.
            Read AGENTS.md first — it is the canonical contract. Check the diff against it,
            especially:
            - getUser() (never getSession()) for any authorization decision
            - no mock data; features connect to real Supabase
            - design token aliases only, no raw Tailwind palette colors
            - Supabase queries only inside feature api/ modules
            - migrations accompanied by regenerated types in the same PR
            - no baseline file raised, no continue-on-error added to a blocking CI job
            Also look for plain correctness bugs, security issues, and SSR-unsafe code
            (window/document at module scope).

            Post specific findings as inline comments on the exact lines. Then post one
            summary comment ending with a verdict line: "Verdict: LGTM" or
            "Verdict: needs attention — <one line why>". Be concise; skip style nitpicks.
          # Pin the model explicitly: without it the CLI resolved to an opus
          # 1M-context variant this API key can't use, so the first API call
          # errored and the run ended in ~2s having posted nothing.
          claude_args: |
            --model claude-sonnet-5
            --allowed-tools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
          # Surface Claude's output in the run log; without this an execution
          # error is invisible and continue-on-error makes the job look green.
          show_full_output: true
