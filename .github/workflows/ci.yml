name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Whole-solution typecheck: tsc --noEmit over tsconfig.app.json and tsconfig.node.json.
      - name: Typecheck
        run: npm run typecheck

      # `npm run lint` is `eslint .` (no --max-warnings). ESLint exits non-zero on errors but
      # tolerates warnings, so this blocks on lint errors while letting the intentionally-deferred
      # react-hooks/exhaustive-deps warnings surface without failing CI.
      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SENTRY_DSN: ""
