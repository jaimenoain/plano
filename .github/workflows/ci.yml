name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs for the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage
          path: coverage/
          retention-days: 14
          if-no-files-found: warn

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build

  migrations:
    name: Migrations lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
      - run: node scripts/check-migrations.mjs

  warning-ratchet:
    name: Warning ratchet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # Fails when any ESLint warning bucket grows beyond .eslint-warning-baseline.json.
      # Fix the new warning; never raise the baseline to get green.
      - run: node scripts/check-eslint-ratchet.mjs

  debt-ratchet:
    name: Debt ratchet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
      # Both fail only when debt GROWS past its frozen baseline. Fix the code;
      # never raise a baseline to get green.
      - name: as-any / ts-ignore ratchet
        run: node scripts/check-as-any-ratchet.mjs
      - name: File-size ratchet
        run: node scripts/check-file-sizes.mjs
      - name: Strict-allowlist ratchet
        run: node scripts/check-strict-allowlist.mjs

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          curl -sSL -o /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
      # Scans the checked-out tree (tracked files only). Pre-existing findings are
      # frozen in .gitleaksignore — if this fails, remove/rotate the secret; never
      # add a new fingerprint to the ignore file.
      - run: /tmp/gitleaks dir . --no-banner --redact --exit-code 1

  types-staleness:
    name: Types staleness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # check-types-staleness diffs against origin/$GITHUB_BASE_REF — a shallow
          # checkout would make that diff silently empty.
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
      # Fails when a PR touches supabase/migrations/ without regenerating
      # src/integrations/supabase/types.ts. Run `npm run gen-types`; never skip.
      - run: node scripts/check-types-staleness.mjs

  e2e:
    name: E2E (advisory)
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
      ACTIVE_USER_EMAIL: ${{ secrets.ACTIVE_USER_EMAIL }}
      ACTIVE_USER_PASSWORD: ${{ secrets.ACTIVE_USER_PASSWORD }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Check E2E secrets are configured
        id: gate
        run: |
          if [ -z "$VITE_SUPABASE_URL" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::E2E skipped — E2E secrets not configured in repo settings (see tests/e2e/README note in CI PR)."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.gate.outputs.run == 'true'
        run: npm ci
      - name: Cache Playwright browsers
        if: steps.gate.outputs.run == 'true'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - if: steps.gate.outputs.run == 'true'
        run: npx playwright install --with-deps chromium
      # Advisory until stable for 2+ weeks, then drop continue-on-error and add
      # to the required checks. Runs against production with QA test accounts.
      - name: Run E2E suite
        if: steps.gate.outputs.run == 'true'
        continue-on-error: true
        run: npx playwright test
      - name: Upload E2E report
        if: ${{ !cancelled() && steps.gate.outputs.run == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore

  advisory:
    name: Advisory (non-blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: RLS coverage (static migration parse — promote once trusted)
        continue-on-error: true
        run: node scripts/check-rls-coverage.mjs
      # Fails only on high/critical advisories in production deps. Known-moderate
      # as of 2026-07-08: ajv ReDoS via @vercel/react-router, no fix upstream.
      - name: Dependency audit (high severity, prod deps)
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high
      - name: Strict typecheck (goal state — informational)
        continue-on-error: true
        run: npm run typecheck:strict
