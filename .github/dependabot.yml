version: 2
updates:
  # Application dependencies (npm). Minor + patch bumps are grouped into a single
  # PR to cut noise from the many @radix-ui/* and @supabase/* packages; major
  # bumps open individually so they can be reviewed one at a time.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Keep the versions of the actions used in .github/workflows/ up to date.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
